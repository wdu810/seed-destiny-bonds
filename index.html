<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>高达SEED · 命运羁绊测试</title>
<meta name="description" content="你是基拉还是阿斯兰？深度角色匹配测试">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#050810;color:#c8d8e8;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:20px;position:relative}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.bg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,80,180,.12) 0%,transparent 60%),
  linear-gradient(180deg,#050810 0%,#0a1020 50%,#050810 100%);}
.screen>*{position:relative;z-index:1}

/* 粒子效果 */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;background:rgba(100,180,255,.6);border-radius:50%;animation:float var(--d,4s) infinite ease-in-out}
@keyframes float{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-20px);opacity:.8}}

h1{font-size:clamp(2rem,7vw,4rem);color:#60aaff;text-shadow:0 0 40px rgba(96,170,255,.4);margin-bottom:8px;text-align:center;letter-spacing:.15em}
h2{font-size:clamp(1.1rem,3.5vw,1.6rem);color:#60aaff;margin-bottom:15px;text-align:center;letter-spacing:.1em}
.tagline{font-size:clamp(.8rem,2vw,.9rem);color:rgba(96,170,255,.4);letter-spacing:.3em;margin-bottom:25px;text-align:center}
.sub{color:#8098b0;font-size:clamp(.85rem,2.5vw,1rem);text-align:center;line-height:2;margin:15px 0 35px;max-width:480px}

.btn{background:linear-gradient(135deg,rgba(96,170,255,.15),rgba(96,170,255,.05));border:1px solid rgba(96,170,255,.3);color:#60aaff;padding:13px 40px;font-size:1rem;border-radius:4px;cursor:pointer;transition:all .4s;font-family:inherit;margin:10px;letter-spacing:.15em}
.btn:hover{background:rgba(96,170,255,.2);box-shadow:0 0 25px rgba(96,170,255,.3);transform:translateY(-1px)}

.divider{width:100px;height:1px;background:linear-gradient(90deg,transparent,#60aaff,transparent);margin:20px auto}

.prog-wrap{width:100%;max-width:500px;margin-bottom:25px}
.prog-label{display:flex;justify-content:space-between;font-size:.75rem;color:rgba(96,170,255,.4);margin-bottom:6px;letter-spacing:.1em}
.prog{width:100%;height:2px;background:rgba(255,255,255,.06);border-radius:1px}
.prog-bar{height:100%;background:linear-gradient(90deg,#3060c0,#60aaff);transition:width .5s;position:relative;border-radius:1px}
.prog-bar::after{content:"";position:absolute;right:0;top:-3px;width:8px;height:8px;background:#60aaff;border-radius:50%;box-shadow:0 0 12px rgba(96,170,255,.8)}

.qcard{background:rgba(255,255,255,.03);border:1px solid rgba(96,170,255,.12);border-radius:6px;padding:clamp(20px,4vw,40px);max-width:580px;width:100%;margin-bottom:15px;position:relative;overflow:hidden}
.qcard::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(96,170,255,.4),transparent)}
.qtext{font-size:clamp(1rem,2.8vw,1.2rem);line-height:1.9;color:#c8d8e8}

.opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.opt{background:rgba(0,20,60,.3);border:1px solid rgba(96,170,255,.1);border-radius:4px;padding:13px 18px;cursor:pointer;transition:all .3s;font-size:clamp(.88rem,2.3vw,1rem);color:#8098b0;font-family:inherit;text-align:left;width:100%;position:relative;padding-left:34px}
.opt::before{content:"◆";position:absolute;left:14px;color:rgba(96,170,255,.25);font-size:.7rem;top:50%;transform:translateY(-50%);transition:all .3s}
.opt:hover{background:rgba(96,170,255,.08);border-color:rgba(96,170,255,.3);color:#a8c0d8}
.opt:hover::before{color:#60aaff}
.opt.sel{background:rgba(96,170,255,.12);border-color:#60aaff;color:#60aaff}
.opt.sel::before{color:#60aaff}

.gsel{display:flex;gap:20px;margin:30px 0;flex-wrap:wrap;justify-content:center}
.gcard{background:rgba(0,20,60,.2);border:1px solid rgba(96,170,255,.15);border-radius:6px;padding:30px 45px;cursor:pointer;transition:all .4s;text-align:center;min-width:140px}
.gcard:hover,.gcard.sel{border-color:#60aaff;background:rgba(96,170,255,.08)}
.gicon{font-size:2.5rem;margin-bottom:12px;opacity:.7}
.glabel{font-size:.9rem;color:#8098b0;letter-spacing:.15em}

.rcard{background:rgba(0,20,60,.15);border:1px solid rgba(96,170,255,.2);border-radius:6px;padding:clamp(25px,5vw,45px);max-width:620px;width:100%;text-align:center;position:relative;overflow:hidden}
.rcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#60aaff,transparent)}
.mpct{font-size:clamp(3.5rem,12vw,6.5rem);color:#60aaff;font-weight:300;text-shadow:0 0 40px rgba(96,170,255,.3);line-height:1}
.mlbl{font-size:.75rem;color:rgba(96,170,255,.4);letter-spacing:.25em;margin:5px 0 18px}
.faction-tag{display:inline-block;font-size:.75rem;color:rgba(96,170,255,.5);border:1px solid rgba(96,170,255,.2);padding:3px 14px;border-radius:3px;letter-spacing:.1em;margin-bottom:10px}
.cname{font-size:clamp(1.8rem,5vw,2.8rem);color:#60aaff;margin:8px 0;letter-spacing:.05em;font-weight:400}
.ctitle{font-size:.9rem;color:rgba(200,216,232,.4);letter-spacing:.1em;margin-bottom:18px;font-style:italic}
.reason{margin:18px 0;color:#8098b0;line-height:1.9;font-size:clamp(.85rem,2.3vw,.95rem);text-align:left;background:rgba(0,20,60,.2);border-left:2px solid rgba(96,170,255,.3);padding:15px 18px;border-radius:0 4px 4px 0}
.story{margin-top:18px;text-align:left;line-height:2;font-size:clamp(.82rem,2.2vw,.92rem);color:#607888;max-height:55vh;overflow-y:auto;padding-right:8px}
.story::-webkit-scrollbar{width:3px}
.story::-webkit-scrollbar-thumb{background:rgba(96,170,255,.2);border-radius:2px}
.story p{margin-bottom:1.2em}
.stitle{font-size:1.1rem;color:rgba(96,170,255,.5);text-align:center;margin-bottom:16px;letter-spacing:.1em}

.ld-wrap{text-align:center}
.ld{font-size:1rem;color:rgba(96,170,255,.6);letter-spacing:.3em}
.ld-bar{width:200px;height:2px;background:rgba(255,255,255,.06);margin:20px auto;position:relative;overflow:hidden;border-radius:1px}
.ld-bar::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#60aaff,transparent);animation:load 2s ease-in-out infinite}
@keyframes load{0%{left:-100%}100%{left:100%}}

.rbtn{background:transparent;border:1px solid rgba(96,170,255,.2);color:rgba(96,170,255,.5);padding:9px 28px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.85rem;margin-top:25px;transition:all .3s;letter-spacing:.1em}
.rbtn:hover{border-color:#60aaff;color:#60aaff}

@keyframes fi{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .5s ease-out}

.disclaimer{font-size:.65rem;color:rgba(255,255,255,.15);text-align:center;margin-top:30px;max-width:400px;line-height:1.8}
</style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="particles" id="pts"></div>

<div id="intro" class="screen active">
  <div class="tagline">CE 71 · 同人创作 · 非官方</div>
  <h1>高达 SEED</h1>
  <div class="divider"></div>
  <h2>命运羁绊测试</h2>
  <p class="sub">调整者与自然人之间的战争，<br>每个人都在寻找自己的答案。<br>你的选择，将决定你与谁的命运相交。</p>
  <button class="btn" onclick="start()">开 始 测 试</button>
  <div class="disclaimer">本测试为同人爱好者创作，非官方内容，不用于任何商业用途。<br>制作：沙隆 · duwei@xiaohongshu.com</div>
</div>

<div id="quiz" class="screen">
  <div class="prog-wrap">
    <div class="prog-label"><span id="qn">第1题</span><span>共10题</span></div>
    <div class="prog"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  </div>
  <div class="qcard fi" id="qc">
    <div class="qtext" id="qt"></div>
    <div class="opts" id="os"></div>
  </div>
</div>

<div id="gender" class="screen">
  <h2>选择你的身份</h2>
  <p class="sub">命运的齿轮，从这一刻开始转动</p>
  <div class="gsel">
    <div class="gcard" onclick="pickG('male',this)"><div class="gicon">♂</div><div class="glabel">男</div></div>
    <div class="gcard" onclick="pickG('female',this)"><div class="gicon">♀</div><div class="glabel">女</div></div>
  </div>
</div>

<div id="loading" class="screen">
  <div class="ld-wrap">
    <div class="ld">命运正在计算中</div>
    <div class="ld-bar"></div>
    <p style="color:rgba(96,170,255,.3);font-size:.8rem;letter-spacing:.15em;margin-top:15px">正在寻找那个与你灵魂相交的人</p>
  </div>
</div>

<div id="result" class="screen">
  <div class="rcard fi" id="rc"></div>
  <button class="rbtn" onclick="restart()">重新测试</button>
  <div class="disclaimer" style="margin-top:15px">本测试为同人爱好者创作，非官方内容，不用于任何商业用途。</div>
</div>

<script>
const CHARS={kira:{n:"基拉·大和",g:"m",f:"ZAFT/大天使号",tt:"最温柔的最强",s:{"loyalty": 5, "bravery": 5, "rebel": 3, "wisdom": 4, "depth": 5, "morals": 9, "adventure": 3, "humor": 2},r:"你是一个内心柔软但力量强大的人。你不喜欢冲突，但当你在乎的人受到威胁时，你会毫不犹豫地站出来。你的温柔不是软弱，而是你最强大的武器。你相信每个人都可以被理解，每个敌人都可能是未来的朋友。",tb:""},athrun:{n:"阿斯兰·萨拉",g:"m",f:"ZAFT",tt:"夹在忠诚之间的骑士",s:{"loyalty": 9, "bravery": 5, "rebel": 1, "wisdom": 4, "depth": 6, "morals": 6, "adventure": 2, "humor": 1},r:"你是那种被忠诚和信念反复撕裂的人。你对朋友、对组织、对理想都有深深的承诺，但当这些东西互相冲突的时候，你是最痛苦的那个。你不会轻易放弃任何一方，所以你会一直寻找那个让所有人都能接受的答案。",tb:""},mu:{n:"穆·拉·弗拉格",g:"m",f:"地球联合军",tt:"笑对死亡的孤鹰",s:{"loyalty": 4, "bravery": 8, "rebel": 4, "wisdom": 5, "depth": 5, "morals": 4, "adventure": 7, "humor": 9},r:"你是那个用笑容掩盖一切的人。你看起来轻松、洒脱、什么都无所谓，但你比谁都清楚自己面对的是什么。你选择了勇敢不是因为不怕，而是因为害怕也没用。你的幽默感是你的铠甲——笑着面对比哭着面对容易得多。",tb:""},andrew:{n:"安德鲁·巴尔特菲尔德",g:"m",f:"ZAFT",tt:"沙漠中最后的绅士",s:{"loyalty": 5, "bravery": 7, "rebel": 3, "wisdom": 6, "depth": 6, "morals": 7, "adventure": 6, "humor": 5},r:"你是一个有风骨的人。你尊重对手，珍惜朋友，即便在战争中也不丢掉自己的底线。你的魅力不在于你多强，而在于你即使在最残酷的环境中，依然保持着作为一个人的尊严和温柔。",tb:""},rau:{n:"劳·鲁·克鲁泽",g:"m",f:"ZAFT",tt:"面具下的虚无",s:{"loyalty": 1, "bravery": 3, "rebel": 7, "wisdom": 9, "depth": 6, "morals": 1, "adventure": 3, "humor": 1},r:"你看到了这个世界最残酷的真相——人类永远学不会和平相处。你不是天生的坏人，你是一个对人性彻底失望的人。你的智慧让你看清了一切，但也正是这份清醒让你陷入了最深的绝望。你选择毁灭，是因为你不再相信创造的可能性。",tb:""},flay:{n:"芙蕾·阿尔斯塔",g:"f",f:"大天使号",tt:"被仇恨吞噬的少女",s:{"loyalty": 2, "bravery": 2, "rebel": 5, "wisdom": 2, "depth": 9, "morals": 1, "adventure": 2, "humor": 1},r:"你经历过失去，那种痛改变了一切。你不再是从前那个单纯的自己了，愤怒和悲伤让你做出了一些连自己都无法理解的选择。你不是坏人，你只是一个被伤害太深、不知道该怎么 healing 的人。",tb:"你和芙蕾的故事，不是从爱情开始的。\n\n是从仇恨开始的。\n\n她是那种你第一眼就不会喜欢的女孩。太闹，太任性，太以自我为中心。她好像觉得全世界都欠她一个道歉。\n\n但你见过她最糟糕的样子。那是在她父亲被杀死的那天之后。\n\n你从来没有见过一个人可以在那么短的时间内完全变成另一个人。\n\n昨天的芙蕾还会因为咖啡太烫而发脾气。今天的芙蕾站在她父亲的遗体前面，没有哭，没有说话，只是看着。她看了一整天。\n\n从那天开始，芙蕾·阿尔斯塔消失了。\n\n取而代之的是一个你不认识的人。\n\n她开始利用你。不是偷偷地利用——是明目张胆地、赤裸裸地、几乎是在告诉你\"我在利用你\"的那种利用。\n\n她知道你知道。你让她利用你。\n\n不是因为你喜欢她。至少当时不是。\n\n是因为你看到了她面具下面的东西——那个被吓坏了的小女孩，那个看着父亲死在面前却无能为力的小女孩，那个在所有人都在安慰她的时候只想一个人待着的小女孩。\n\n你看到她最糟糕的样子，但你没有走。\n\n不是因为你是圣人。是因为你知道——在某个很深的地方——如果此刻没有人留在她身边，她可能永远都不会再相信任何人了。\n\n\"你为什么不走？\"有一天她问你。\n\n你们在她父亲的墓碑前面。她跪在那里，手指抠着泥土，指甲都断了。\n\n\"因为你在。\"你说。\n\n\"我不值得。\"\n\n\"我知道。\"\n\n她抬起头看你。眼睛里有一种你从来没有见过的东西。不是恨，不是愤怒，不是悲伤。\n\n是恐惧。\n\n她害怕自己不值得被爱。不是因为自卑——是因为她真的做了一些不可原谅的事。她背叛了信任她的人，她伤害了无辜的人，她用愤怒和仇恨做借口，做了她明知道是错的事。\n\n\"我做了很多坏事。\"她说。\n\n\"我知道。\"\n\n\"你不生气吗？\"\n\n\"生气。\"\n\n\"那为什么……\"\n\n\"因为如果你不值得被爱的时候就是最需要被爱的时候。\"\n\n她愣住了。然后她哭了。不是那种安静的、优雅的哭。是那种撕心裂肺的、把所有压抑的东西都释放出来的哭。\n\n你跪下来，抱住她。\n\n她没有推开你。\n\n后来，芙蕾变了很多。不是变好了——是变真实了。她不再假装坚强，不再用愤怒掩盖恐惧，不再用仇恨填补失去的空洞。\n\n她开始学习做一件她从来没有学会的事——原谅自己。\n\n你陪着她学。\n\n\"你知道吗，\"有一天她对你说，\"所有人爱的都是以前的我。那个天真的、无忧无虑的芙蕾。\"\n\n\"那个人已经死了。\"\n\n\"你不觉得可惜吗？\"\n\n\"不可惜。\"你看着她的眼睛，\"因为你比那个人好多了。\"\n\n\"为什么？\"\n\n\"因为她没有经历过黑暗。而你在黑暗里待过，但你还是走了出来。\"\n\n她看着你，然后笑了。\n\n不是那种完美的、阳光灿烂的笑。是一个有点歪的、有点勉强的、但无比真实的笑。\n\n\"你真的很讨厌。\"她说。\n\n\"我知道。\"\n\n\"但你讨厌得刚刚好。\"\n\n你们的故事不是童话故事。没有王子和公主。没有\"从此幸福地生活在一起\"。\n\n你们的故事是两个伤痕累累的人在废墟里找到彼此的故事。\n\n而她最后对你说的那句话，比任何\"我爱你\"都更让你心动：\n\n\"谢谢你没有在我最糟糕的时候离开。因为那就是我最需要你的时候。"},izaku:{n:"伊扎克·玖尔",g:"m",f:"ZAFT",tt:"骄傲的红色彗星",s:{"loyalty": 7, "bravery": 9, "rebel": 2, "wisdom": 2, "depth": 5, "morals": 4, "adventure": 5, "humor": 1},r:"你是一个骄傲到骨子里的人。你不屑于掩饰自己的情绪，喜欢就是喜欢，讨厌就是讨厌。你的忠诚是纯粹的——一旦你认可了某个人或某个信念，你会为之战斗到底。你的弱点是太在乎输赢，但这也是你最可爱的地方。",tb:""},dearka:{n:"迪亚哥·艾尔斯曼",g:"m",f:"ZAFT",tt:"最先看清真相的聪明人",s:{"loyalty": 3, "bravery": 5, "rebel": 5, "wisdom": 7, "depth": 5, "morals": 4, "adventure": 5, "humor": 6},r:"你是那种比周围人更早看清局势的人。你不会盲从，不会轻信，你会自己思考、自己判断。你的适应能力很强，当发现原有的信念站不住脚时，你有勇气做出改变。你不太喜欢表露内心，但你的内心比看起来柔软得多。",tb:""},murrue:{n:"玛琉·拉米亚斯",g:"f",f:"大天使号舰长",tt:"暴风雨中的掌舵者",s:{"loyalty": 7, "bravery": 6, "rebel": 1, "wisdom": 7, "depth": 5, "morals": 6, "adventure": 3, "humor": 2},r:"你是一个在风暴中依然能保持冷静的人。你肩上扛着整艘船的重量，但你从不抱怨。你的坚韧不是天生的，是在一次次失去和重来中磨练出来的。你相信责任，相信承诺，相信哪怕在最黑暗的时候也要做出正确的选择。",tb:"你第一次见到玛琉·拉米亚斯，是在大天使号的舰桥上。\n\n她站在一群慌乱的人中间，是唯一一个看起来知道自己在做什么的人。\n\n\"舵手左满舵！炮手准备迎击！所有人回到各自岗位！\"\n\n她的声音不响，但所有人都听了。\n\n你看着她，然后你想了一件事——这个人一定很累。\n\n不是身体上的累。是那种一个人扛着所有人的命的那种累。\n\n后来你才知道，她不是天生的舰长。她只是一个被命运推到那个位置的普通人。一群不懂战争的孩子的船长，带着一群不应该上战场的人，在一场谁都不了解的战争中求生。\n\n她每天晚上都会一个人留在舰桥上。\n\n不是加班。是等所有人都睡了之后，她才敢松一口气。\n\n你发现这个秘密是因为一次意外。你半夜起来喝水，路过舰桥，发现灯还亮着。\n\n她坐在那里，双手撑着额头，闭着眼睛。\n\n你没有进去。你站在门口看了一会儿。\n\n她不知道有人在看着她。她以为只有她一个人。\n\n她的手在发抖。\n\n不是因为害怕。是因为她白天不能抖。白天她必须是舰长。白天她必须是那个所有人都信赖的人。白天她必须做每一个生死攸关的决定，并且承担每一个决定的后果。\n\n只有在这个所有人都睡着了的深夜里，她才可以抖一下。\n\n你第二天给她送了一杯咖啡。\n\n\"怎么？\"她接过咖啡，有点意外。\n\n\"你看起来需要这个。\"\n\n她看着你，然后笑了。不是那种舰长的、威严的笑。是一个有点疲惫、有点不好意思的笑。\n\n\"谢谢。\"\n\n\"昨晚舰桥的灯亮了一夜。\"你说。\n\n她的表情变了一下。\"你在舰桥外面？\"\n\n\"路过。\"\n\n沉默了一会儿。\n\n\"你看到了什么？\"她问。\n\n\"一个需要喝咖啡的人。\"\n\n她看着你，眼睛里的某种东西动了一下。然后她什么也没说，只是低头喝了口咖啡。\n\n从那之后，每天晚上深夜，舰桥上都会多一个人。\n\n不说话。不聊天。你坐在她旁边，看星星。\n\n她做她的工作，你什么都不做。\n\n就这样。\n\n后来有人问她：\"为什么让他在舰桥上陪你？\"\n\n她说：\"因为他是唯一一个看到我手抖的人，但他没有说'你行不行'，而是给我倒了一杯咖啡。\"\n\n玛琉·拉米亚斯不是那种会说\"我需要你\"的人。\n\n她是那种会在凌晨三点让你坐在舰桥上陪她看星星的人。\n\n她是那种在所有人面前坚强，但允许你看到她手抖的人。\n\n她是那种不会说\"我爱你\"，但会在你最需要的时候，默默把咖啡放在你桌上的人。\n\n你们之间没有轰轰烈烈的告白。\n\n只有一次又一次的深夜陪伴。\n\n一次又一次的、\"我在这里\"的沉默证明。\n\n而那种沉默，比任何语言都响。"},neo:{n:"尼奥·罗亚诺克",g:"m",f:"地球联合军/幻痛",tt:"遗忘过去的幻影",s:{"loyalty": 1, "bravery": 7, "rebel": 5, "wisdom": 4, "depth": 5, "morals": 3, "adventure": 8, "humor": 5},r:"你失去了最重要的东西——记忆。你不知道自己是谁，不知道自己从哪里来，不知道自己在为什么而战。但即便如此，你依然在本能地保护着什么、寻找着什么。你的故事是关于身份的——当一切都被剥夺之后，你剩下的那部分才是真正的你。",tb:""},shinn:{n:"真·飞鸟",g:"m",f:"ZAFT",tt:"被火焰吞噬的少年",s:{"loyalty": 4, "bravery": 9, "rebel": 4, "wisdom": 1, "depth": 6, "morals": 3, "adventure": 6, "humor": 1},r:"你是一个被过去困住的人。失去亲人的痛苦在你心里烧成了一团火，这团火给了你力量，但也烧毁了你的判断力。你做事冲动、直接、不计后果，不是因为你不聪明，而是因为你的情绪太强烈了。你的成长之路就是学会把那团火变成光，而不是让它烧掉你自己和身边的人。",tb:""},rey:{n:"雷·扎·巴雷尔",g:"m",f:"ZAFT",tt:"影子中的人",s:{"loyalty": 9, "bravery": 4, "rebel": 1, "wisdom": 6, "depth": 6, "morals": 4, "adventure": 1, "humor": 1},r:"你是一个活在他人的阴影里的人。你把全部的忠诚和信念都交给了一个你认为比自己更伟大的人，但在那份忠诚的背后，隐藏着一个迷茫的灵魂。你在寻找自己的意义，但也许你还没有勇气面对那个问题——如果没有了那份信仰，你还剩什么？",tb:""},durandal:{n:"吉尔伯特·杜兰朵",g:"m",f:"PLANT议长",tt:"用命运编织的棋手",s:{"loyalty": 1, "bravery": 4, "rebel": 6, "wisdom": 9, "depth": 6, "morals": 1, "adventure": 2, "humor": 2},r:"你是一个天生的棋手。你看到的世界是棋盘，每个人都是棋子——包括你自己。你的智慧和远见让你能够规划一切，但你最终可能忽略了一个事实：人不是棋子，人心是无法被计算的。你最大的悲剧在于：你太聪明了，聪明到忘记了自己也是个人。",tb:""},lacus:{n:"拉克丝·克莱茵",g:"f",f:"PLANT/三舰同盟",tt:"歌声中的革命者",s:{"loyalty": 4, "bravery": 5, "rebel": 6, "wisdom": 8, "depth": 6, "morals": 8, "adventure": 3, "humor": 3},r:"你比大多数人都看得更远、想得更深。你的力量不在于你多强，而在于你能看到别人看不到的可能性。你选择用温柔的方式去改变世界——不是用枪和拳头，而是用理解和信念。你的勇敢不是冲上去战斗，而是在所有人都觉得不可能的时候，依然选择相信。",tb:"你第一次见到拉克丝·克莱茵，是在一个你完全没有预料到的地方。\n\n不是电视屏幕上，不是在PLANT的舞台上，不是在那个所有人都在仰望的聚光灯下。\n\n你是在一艘破旧的小型飞船的走廊里遇到她的。\n\n她穿着一件普通的白色连衣裙，没有化妆，没有舞台上的那种完美笑容。她就那样坐在那里，双腿蜷起来，看着窗外的一片星空。\n\n你本来不该在那里的。你是ZAFT的一名普通士兵，被临时分配到这艘船做运输任务。你不知道这艘船上载着的是谁——或者说，你假装自己不知道。因为你知道如果被发现，你会有大麻烦。\n\n但你还是走进了那个走廊。因为你在远处听到了歌声。\n\n很轻，几乎听不见。像是一个人在自言自语，又像是在对某个不在场的人说话。\n\n你停在门口，没有进去。\n\n她唱了一会儿，然后转过头，看到了你。\n\n你没有跑。不知道为什么，你没有跑。\n\n她看着你，然后笑了——不是那种电视上的、完美的、属于拉克丝·克莱茵的笑。是一个有点疲惫、有点好奇、有点像是在说\"你也睡不着吗\"的笑。\n\n\"你也是来躲清静的吗？\"她问。\n\n你不知道该怎么回答。你应该叫她\"克莱茵小姐\"，或者\"议长阁下\"，或者至少站起来行礼。但你没有。你只是靠在门框上，说了一句连自己都觉得不可思议的话：\n\n\"这里的星星比外面亮。\"\n\n她愣了一下，然后往旁边挪了挪，空出一个位置。\n\n你就那样坐下了。和她。和拉克丝·克莱茵。在一条走廊里，看星星。\n\n你们没有说话。不是那种需要说话的场合。\n\n过了一会儿，她说了一句话，那句话后来在你心里住了很久很久。\n\n\"你知道吗，每个人看到的我都不一样。歌迷看到的我是歌手，政客看到的我是前议长的女儿，PLANT的人民看到的我是希望。\"她顿了一下，\"但没有人看到我现在看到的东西。\"\n\n\"是什么？\"你问。\n\n\"星星。\"她说，\"就只是星星。\"\n\n你转过头看她。她侧脸被星光映着，眼睛里有一种你从未在任何采访、任何演唱会上看到过的东西。\n\n那种东西叫做孤独。\n\n不是表面的、可以被拥抱治愈的那种孤独。是深处的、结构性的、从骨头缝里渗出来的孤独。\n\n她是拉克丝·克莱茵。她是这个世界上最被爱着的人之一。但她可能也是这个世界上最孤独的人之一。\n\n因为你身边的人都爱着你身上的某个东西——你的歌声、你的地位、你代表的希望——而不是你这个人本身。\n\n你忽然很想做一件事。\n\n不是拥抱她，不是安慰她，不是说一些漂亮话。\n\n你只是伸出手，指着窗外一颗很暗的星星，说：\"你看那个。\"\n\n她凑过来看。\"哪颗？\"\n\n\"那个。很暗的那个。几乎看不见的那个。\"\n\n她看了半天。\"我看到了。好暗。\"\n\n\"对，\"你说，\"但它在那里。即使所有人都看不到，它还是在那里。\"\n\n她没有说话。但你感觉到了她的肩膀微微颤抖了一下。\n\n你不知道那是不是哭。她很快就把头转开了，你假装没有注意到。\n\n但那个晚上改变了你们两个人。\n\n从那之后，每次她在公众面前微笑的时候，你都在人群后面看着。别人看到的是拉克丝·克莱茵的完美笑容。你看到的是那个在走廊里看着一颗暗星的、孤独的女孩。\n\n你决定做一件事——不是做她的歌迷，不是做她的追随者，不是做她的保镖。\n\n你要做那个知道她看星星的人。\n\n后来，战争越来越激烈。她离开了，你留在了前线。你们再也没有在那条走廊里坐过。\n\n但每次抬头看星星的时候，你都会找那颗最暗的。\n\n你知道她也在找。\n\n这就是你们之间的羁绊——不是轰轰烈烈的爱情，不是山盟海誓的承诺。\n\n是一个普通的夜晚，两个孤独的人，一起看了一颗很暗的星星。\n\n而那个瞬间，比她所有的歌声、所有的演讲、所有的光环都更真实。"},cagalli:{n:"卡嘉莉·尤拉·阿斯哈",g:"f",f:"奥布",tt:"沙漠中的烈焰",s:{"loyalty": 5, "bravery": 9, "rebel": 5, "wisdom": 2, "depth": 5, "morals": 6, "adventure": 7, "humor": 5},r:"你是一个用行动说话的人。你不擅长拐弯抹角，想到什么就做什么，但你的冲动背后是一颗真诚到骨子里的心。你为了自己在乎的人和国家可以付出一切。你的成长就是从一匹独狼变成一个真正的领导者——学会不仅仅是战斗，而是守护。",tb:"你第一次见到卡嘉莉·尤拉·阿斯哈的时候，她正拿枪指着你。\n\n不是比喻。是真的拿着一把手枪，对准你的额头。\n\n\"你是谁？\"她问。声音有点抖，但枪很稳。\n\n你举起双手。\"路过的人。\"\n\n\"这里没有路过的。\"她说。\n\n你看了看周围——沙漠，废墟，什么都没有。确实没有路过的理由。\n\n她盯着你看了很久，然后把枪放下了。但手指还放在扳机上。\n\n\"别动。我去叫人。\"\n\n她转身走了两步，又停下来。\n\n\"你叫什么名字？\"\n\n你说了。\n\n她记住了。这是后来你才知道的——她记住了每一个她遇到的人的名字。不是因为她在乎，而是因为她觉得这是对别人最起码的尊重。即使那个人是敌人。\n\n卡嘉莉不是那种你会在第一眼就爱上的人。\n\n她太烈了。像一团火，离近了烫，离远了冷。她说话不绕弯子，做事不计后果，永远在冲在最前面，永远在想\"怎么做\"而不是\"应不应该做\"。\n\n但你知道一件事——别人不知道的事。\n\n你见过她哭。\n\n不是那种\"女战士坚强地流下一滴眼泪\"的哭。是真的哭。像一个小女孩那样，蹲在地上，用手捂着脸，肩膀一抽一抽的，发出一种你听了心碎的声音。\n\n那是在她父亲的葬礼之后。\n\n所有人都走了。她一个人留在那个空荡荡的房间里。你不知道她在那里坐了多久。你本来不该进去的，但门关着，你听到了声音，你就进去了。\n\n她看到你的时候，立刻把脸转开了。\n\n\"出去。\"\n\n\"好。\"\n\n你站在门口。没有进来，也没有走。\n\n\"你刚才说'好'？\"她问。\n\n\"嗯。\"\n\n\"那你为什么不出去？\"\n\n\"等你不哭的时候。\"\n\n沉默了很久。\n\n\"我没有哭。\"\n\n\"好。\"\n\n又沉默了很久。\n\n然后她站起来，擦了擦脸，走到你面前。\n\n\"你知道奥布是什么地方吗？\"她问。\n\n你摇头。\n\n\"是我爸用命换来的地方。他说奥布是一个不偏袒任何一方的国家。一个中立的地方。一个可以让所有无家可归的人找到庇护的地方。\"她看着你，\"我要守住它。就算要拿我的命去换。\"\n\n你看着她。她的眼睛还是红的，但已经没有泪水了。\n\n\"你一个人守不住。\"你说。\n\n\"我知道。\"她顿了一下，\"所以我需要你。\"\n\n不是\"我需要你帮忙\"。是\"我需要你\"。\n\n三个词。不是请求，不是命令。是一个声明。\n\n你看着她的眼睛，然后说了一句话。一句后来你自己都觉得不可思议的话：\n\n\"好。\"\n\n她说\"好\"的时候，是在等你不哭。\n\n你说\"好\"的时候，是在告诉她：你不会走。\n\n后来的故事很长。战争、背叛、失去、重建。卡嘉莉从一个沙漠里的野猫变成了一个国家的领导者。她学会了妥协、学会了外交、学会了说一些她以前永远不会说的话。\n\n但她有一件事从来没有变过。\n\n每次遇到最难的决定，她都会走到那个房间——那个她父亲去世后她一个人哭过的房间——坐一会儿。\n\n后来你也去过那个房间。\n\n不是一个人。是她拉着你去的。\n\n\"你看，\"她指着窗外，\"从这里可以看到整个奥布。\"\n\n你看到了。一片被夕阳染成金色的土地。\n\n\"我爸说，\"她的声音很轻，\"这片土地之所以是金色的，不是因为阳光，是因为每一代人为它流过的血。\"\n\n你转过头看她。\n\n她笑了。不是那种女战士的、坚强的、什么都不在乎的笑。是一个有点疲惫但很安心的笑。\n\n\"还好有你。\"她说。\n\n你握住她的手。她没有躲开。\n\n卡嘉莉·尤拉·阿斯哈。她不温柔，不细腻，不会说情话。\n\n但她会在沙漠里拿枪指着你，然后记住你的名字。\n\n她会在所有人面前坚强，只在你面前哭一次。\n\n她会在最艰难的时候说\"我需要你\"，而不是\"我需要你帮忙\"。\n\n这就是她爱你的方式。\n\n不是温柔，是信任。\n\n而信任，比任何情话都重。"},meer:{n:"蜜雅·坎贝尔",g:"f",f:"PLANT",tt:"镜子里的影子",s:{"loyalty": 2, "bravery": 3, "rebel": 3, "wisdom": 2, "depth": 8, "morals": 4, "adventure": 4, "humor": 6},r:"你是一个活在别人期待里的人。你被选中去扮演另一个角色，一开始你可能觉得兴奋，但渐渐地你发现那不是真正的自己。你内心的挣扎是——你渴望被爱、被认可，但你不确定别人爱的是你还是你扮演的角色。你的故事是关于寻找真实的自己。",tb:"你第一次见到蜜雅·坎贝尔，是在一个化妆间里。\n\n她坐在镜子前面，穿着一件你不认识的衣服——后来你才知道，那是拉克丝·克莱茵的衣服。\n\n她正在化妆。不是普通的化妆——是在把自己变成另一个人。\n\n她拿着眉笔，一笔一笔画着。她的脸一点一点变得和拉克丝一模一样。\n\n\"好看吗？\"她转过头看到你，笑着问。\n\n\"你是谁？\"你问。\n\n\"我是拉克丝·克莱茵。\"她说，然后自己笑了，\"开玩笑的。我是蜜雅。蜜雅·坎贝尔。一个普通人。\"\n\n但你后来发现，蜜雅不是普通人。\n\n至少不是一直都是。\n\n她是一个被选中的普通人。有人看中了她的声音、她的面容、她的样子，然后要求她成为拉克丝·克莱茵。\n\n不是模仿。是成为。\n\n一开始她觉得这很酷。\n\n\"你能想象吗？\"她有一天兴奋地对你说，\"所有人都以为我是她！歌迷、记者、甚至……甚至她身边的人。\"\n\n\"你觉得好玩吗？\"你问。\n\n\"当然好玩啊！\"她说，\"我是蜜雅·坎贝尔——一个什么都不出众的普通女孩。但现在我是拉克丝·克莱茵！所有人都爱我！\"\n\n她笑得很开心。但你看到了她的眼睛。\n\n她的眼睛里有一种她自己可能都没意识到的东西。\n\n空虚。\n\n慢慢地，事情变了。\n\n她开始分不清自己是谁。\n\n有时候她对着镜子，会突然不知道自己看到的是蜜雅还是拉克丝。她会在唱歌的时候不自觉地用拉克丝的嗓音——不是装的，是她已经忘了自己的声音是什么样的。\n\n\"蜜雅，\"你有一天问她，\"你喜欢什么颜色？\"\n\n\"嗯……\"她想了想，\"蓝色？不对，拉克丝喜欢蓝色。我喜欢什么颜色来着？\"\n\n她笑了，但那个笑比哭还让你难受。\n\n\"我不知道。\"她说，\"我好像……忘了。\"\n\n你决定做一件事。\n\n不是帮她找到拉克丝，不是帮她完成使命，不是帮她成为那个所有人都想要的\"拉克丝\"。\n\n你要帮她找到蜜雅·坎贝尔。\n\n\"走。\"你说。\n\n\"去哪？\"\n\n\"去一个没有人认识拉克丝·克莱茵的地方。\"\n\n你带她去了一个小镇。一个很偏远的、没有人关心政治和明星的小镇。\n\n你们走进一家小咖啡馆。老板不认识拉克丝，所以也没有认出蜜雅。\n\n\"你叫什么名字？\"老板问蜜雅。\n\n\"我……\"她犹豫了一下。\n\n然后她说了一个你等了很久的答案：\n\n\"蜜雅。蜜雅·坎贝尔。\"\n\n不是\"拉克丝\"。不是\"坎贝尔小姐\"。是蜜雅。\n\n老板笑了笑。\"蜜雅。好名字。要什么？\"\n\n\"热巧克力。\"她说，\"我喜欢热巧克力。\"\n\n不是装的。不是演的。是她真的喜欢。\n\n你看着她喝热巧克力的样子，然后你知道了——蜜雅·坎贝尔回来了。\n\n\"你知道吗，\"她说，眼睛看着杯子里的热巧克力，\"所有人都想要拉克丝·克莱茵。但只有你问我蜜雅·坎贝尔喜欢什么颜色。\"\n\n\"因为你值得被看见。\"你说，\"不是拉克丝。是你。蜜雅。\"\n\n她抬起头。眼睛里有泪。但她没有哭。\n\n她笑了。不是拉克丝的笑容——不是那种完美的、练习过千百次的、属于舞台的笑容。\n\n是一个有点歪的、有点笨拙的、但属于她自己的笑容。\n\n\"谢谢你。\"她说。\n\n\"不用谢。\"\n\n\"不，\"她看着你，\"你不知道这对我来说意味着什么。所有人都在叫拉克丝的名字。只有你在叫我的名字。\"\n\n蜜雅·坎贝尔。\n\n她不是拉克丝·克莱茵。她不会唱歌，不会演讲，不会改变世界。\n\n她只是一个被借走了太久的、终于回家的人。\n\n而你，是那个叫她回家的人。"},lunamaria:{n:"露娜玛丽亚·霍克",g:"f",f:"ZAFT",tt:"在忠诚与真相之间",s:{"loyalty": 7, "bravery": 6, "rebel": 2, "wisdom": 4, "depth": 5, "morals": 5, "adventure": 4, "humor": 5},r:"你是一个忠诚但并非盲从的人。你相信规则，相信秩序，相信服从是正确的选择——直到有一天你发现规则本身就是错的。你的痛苦在于你不是一个轻易怀疑的人，所以当怀疑来临的时候，它会动摇你的一切。但你的勇敢在于你最终会选择真相，即使真相意味着背叛你曾经相信的一切。",tb:"你和露娜玛丽亚的故事，是从一次吵架开始的。\n\n不是那种\"我爱你但你不懂我\"的浪漫争吵。是真的吵架。那种会摔门、会冷战、会好几天不理对方的吵架。\n\n\"你总是这样！\"她冲你喊，\"你总是觉得你什么都对！\"\n\n\"我没有。\"\n\n\"你有！你每次做决定的时候都不问我！\"\n\n\"因为我想保护你。\"\n\n\"我不需要你保护！我是ZAFT的红衣精英！我上过战场！我驾驶过机动战士！\"\n\n\"我知道。但这和那是两码事。\"\n\n\"那和那有什么区别？\"\n\n\"因为你是我……\"你停住了。\n\n\"是你什么？\"\n\n你没有说下去。\n\n这就是露娜玛丽亚·霍克。烈得像一团火，直得像一根箭。她喜欢你就直说，生气了就开吵，不在乎就不会理你。\n\n你不会在她那里找到委婉、暗示、欲言又止。\n\n你会找到她凌晨两点给你发的一条消息：\"你在吗？\"\n\n\"在。怎么了？\"\n\n\"我梦到妹妹了。\"\n\n你到了她那里的时候，她坐在床上，双腿蜷着，抱着膝盖。\n\n她没有哭。但你知道她快要哭了——因为露娜玛丽亚只有在快要哭的时候才会变得这么安静。\n\n\"她还好吗？\"你坐下来，问她。\n\n\"我不知道。\"她摇头，\"战争结束之后就没有她的消息了。\"\n\n她说的妹妹是美玲。她们一起参的军，一起在密涅瓦号上服役。后来一切乱了，她们失散了。\n\n\"她会没事的。\"你说。\n\n\"你怎么知道？\"\n\n\"因为她是露娜玛丽亚·霍克的妹妹。\"\n\n她看了你一眼。\n\n\"什么意思？\"\n\n\"意思是你们家的人都很顽强。\"\n\n她沉默了一会儿。然后她把头靠在了你的肩膀上。\n\n不是轻轻的、试探性的靠。是用力的、像是抓住救命稻草一样的靠。\n\n\"别动。\"她说。\n\n\"好。\"\n\n\"别说。\"\n\n\"好。\"\n\n\"就这样。\"\n\n\"好。\"\n\n你就那样坐了一个小时。一动不动。\n\n后来她抬起头，眼睛还是红的，但已经不会哭了。\n\n\"你知道吗，\"她说，\"所有人看到的我都是那个 ZAFT 的红衣精英。那个驾驶机动战士的、勇敢的、什么都搞得定的露娜玛丽亚。\"\n\n\"然后呢？\"\n\n\"没有人看到我现在这样。\"\n\n\"我看到了。\"\n\n她看着你。\n\n\"你看到什么了？\"\n\n\"一个在担心妹妹的姐姐。\"\n\n她没有说话。但她的手握住了你的手。握得很紧。\n\n露娜玛丽亚不是那种会说甜言蜜语的人。\n\n她不会在纪念日给你惊喜，不会写情书，不会在公共场合牵你的手。\n\n但她会在凌晨两点给你发消息说\"我梦到妹妹了\"。\n\n她会在吵架之后第一个道歉——不是因为她是错的，而是因为她受不了你不理她。\n\n她会在所有人面前扮演强者，但只在你面前承认她害怕。\n\n你问她：\"你为什么只在我面前这样？\"\n\n她说：\"因为所有人都觉得我不需要。只有你觉得我需要。\"\n\n这就是露娜玛丽亚·霍克的爱。\n\n不是温柔。是信任。\n\n而信任，是比任何情话都重的东西。"},stella:{n:"史黛拉·鲁西耶",g:"f",f:"地球联合军/幻痛",tt:"被武器化的孩子",s:{"loyalty": 3, "bravery": 5, "rebel": 1, "wisdom": 1, "depth": 6, "morals": 5, "adventure": 4, "humor": 3},r:"你是一个被剥夺了选择权的人。你本不该出现在战场上，你本该有一个正常的人生。但命运把你变成了武器，一个被操控的、不知道自己为什么在战斗的孩子。你的内心依然柔软，依然渴望被爱——这份纯真恰恰是这个世界最残忍的东西。",tb:"你第一次见到史黛拉·鲁西耶的时候，你不知道她是谁。\n\n她站在一片废墟里，穿着一件太大的外套，光着脚，眼神空洞地看着前方。\n\n她的脸上没有表情。不是那种\"很酷\"的没有表情——是那种\"不知道该做出什么表情\"的没有表情。像一个忘了怎么笑的小孩。\n\n\"你还好吗？\"你走过去问她。\n\n她转过头看你。眼睛里有一种你从来没有见过的东西。\n\n恐惧。\n\n不是对某一样东西的恐惧。是对一切的恐惧。对声音、对光线、对陌生人的靠近、对这个世界的存在的恐惧。\n\n她退后了一步。\n\n\"别怕，\"你说，举起双手，\"我不会伤害你。\"\n\n她没有说话。但她停住了，没有继续退。\n\n你后来才知道她是谁。\n\n史黛拉·鲁西耶。一个被战争剥夺了选择权的女孩。被地球联合军的\"生化CPU\"计划改造成了一个武器——被注射药物，被洗脑，被剥夺了正常的情感和判断力。\n\n她不知道自己为什么在战斗。不知道自己在为谁而战。不知道自己要保护什么。\n\n她只是一台被上了发条的、停不下来的机器。\n\n但在那台机器的深处，你看到了一个不一样的东西。\n\n一个害怕的、孤独的、想回家的小女孩。\n\n你看到了那个东西，是因为一次意外。\n\n她——作为武器的那个她——在战场上失控了。她的机体在爆炸中受损，她被抛了出来。你找到她的时候，她蜷缩在一个角落里，双手抱着头，浑身发抖。\n\n\"史黛拉。\"你叫她的名字。\n\n她抬起头。\n\n\"我不认识你。\"她说。声音很小。像是怕说大了声就会有人来。\n\n\"我知道。但你认识我。\"\n\n\"不……我不认识……\"\n\n\"没关系。\"你蹲下来，和她平视，\"我可以重新认识你。\"\n\n她看着你。眼睛里有一丝你从未见过的东西。\n\n不是恐惧。是好奇。\n\n\"你叫什么名字？\"她问。\n\n你说了。\n\n\"好听。\"她说。\n\n这是史黛拉·鲁西耶作为一个\"人\"说出的第一句话。\n\n不是作为武器。不是作为生化CPU。不是作为任何人计划中的棋子。\n\n是作为一个小女孩。\n\n你花了很长时间才让她重新学会微笑。\n\n不是因为笑很难——是因为她已经太久没有笑过了。她忘了嘴角应该往哪个方向弯。\n\n你教她。不是用语言。是用你自己。\n\n你对她笑。一次，又一次，再又一次。\n\n直到有一天，她终于笑了。\n\n不是那种完美的、练习过的笑。是一个有点歪的、有点笨拙的、像是一个刚刚学会走路的小孩迈出的第一步那样的笑。\n\n但那个笑，是你这辈子见过的最美丽的东西。\n\n因为那不是武器的笑。\n\n是史黛拉的笑。\n\n\"你笑的时候很好看。\"你说。\n\n\"真的？\"\n\n\"真的。\"\n\n\"那……那我以后多笑给你看。\"\n\n\"好。\"\n\n你后来才知道，那句话是她作为\"人\"说的第一个承诺。\n\n而你，是那个让她重新学会做\"人\"的人。\n\n史黛拉·鲁西耶不该出现在战场上。\n\n她该出现在阳光下。出现在花丛里。出现在一个不需要武器的世界里。\n\n出现在你的身边。\n\n而她最后看着你笑的那个样子——\n\n就是你在这个残酷的战争里，找到的唯一值得战斗的理由。"},taliaz:{n:"塔莉娅·格拉蒂斯",g:"f",f:"密涅瓦号舰长",tt:"铁面下的柔情",s:{"loyalty": 8, "bravery": 5, "rebel": 1, "wisdom": 7, "depth": 5, "morals": 5, "adventure": 2, "humor": 1},r:"你是一个把感情藏在制服下面的人。你的职责要求你冷静、果断、不偏不倚，但你心里比谁都清楚什么是对什么是错。你在职责和良知之间反复挣扎——作为军人，你的任务是服从；作为人，你知道有些事情不能就这样接受。",tb:"你和塔莉娅·格拉蒂斯的故事，是从沉默开始的。\n\n不是那种尴尬的沉默——是那种两个人都知道对方在想什么、但谁都不想先说出来的沉默。\n\n她是密涅瓦号的舰长。你是在她手下服役的一名军官。\n\n你们之间隔着军阶、隔着规矩、隔着\"不应该\"三个字。\n\n但你注意到了一个没有人注意到的细节。\n\n塔莉娅·格拉蒂斯的制服永远是全舰队最整洁的。\n\n不是那种\"为了好看\"的整洁——是那种\"如果我的制服有哪怕一个皱褶，我就觉得我不配指挥这艘船\"的整洁。\n\n她的纽扣永远扣到最上面一颗。她的头发永远一丝不乱。她的靴子永远亮到可以照人。\n\n你觉得这是某种强迫症。\n\n后来你才知道——那不是强迫症。那是她唯一能控制的东西。\n\n战争在失控。上级在下达她无法认同的命令。她手下的人在死去。她效忠的人在走向疯狂。\n\n她什么都控制不了。\n\n但她的制服。她的制服可以永远整洁。\n\n\"你注意到我的制服了？\"有一天她问你。\n\n你们在她办公室里。她正在整理一份报告，头也不抬。\n\n\"嗯。\"\n\n\"为什么？\"\n\n\"因为它是你身上唯一没有皱褶的东西。\"\n\n她停下了手中的笔。\n\n过了很久，她说了一句话。一句她可能从来没有对任何人说过的话。\n\n\"有时候我觉得如果我把这颗纽扣松开，一切都会崩溃。\"\n\n\"也许不会。\"\n\n\"也许。\"\n\n她终于抬起头看你。眼睛里有某种东西在闪——不是泪，是比泪更危险的东西。\n\n是动摇。\n\n塔莉娅·格拉蒂斯是一个军人。军人的天职是服从。\n\n但她不是一个盲从的人。她看到了杜兰朵议长的\"命运计划\"有问题。她知道这个计划正在把所有人推向一个不可挽回的方向。\n\n但她是舰长。她不能质疑。不能反抗。不能违抗。\n\n所以她的制服越来越整洁。\n\n因为那是她唯一能控制的东西。\n\n你决定帮她做一件事。\n\n不是劝她背叛。不是劝她服从。不是帮她做任何决定。\n\n你只是在她办公室的抽屉里放了一颗备用的纽扣。\n\n下面有一张纸条：\"当你需要松开一颗纽扣的时候，用这个。\"\n\n她第二天来找你。\n\n\"纽扣我看到了。\"\n\n\"嗯。\"\n\n\"你为什么要这么做？\"\n\n\"因为所有人都在要求你扣紧。我觉得偶尔松开一颗也没关系。\"\n\n她看了你很久。\n\n然后她做了一件你从未见过的事——她笑了。\n\n不是那种舰长的、威严的、\"一切尽在掌握\"的笑。\n\n是一个有点疲惫的、有点不好意思的、像是一个终于被允许休息的人的笑。\n\n\"你知道吗，\"她说，\"这么多年，所有人都对我只有'服从'和'忠诚'这两个词。\"\n\n\"然后呢？\"\n\n\"你是第一个对我说'没关系'的人。\"\n\n塔莉娅·格拉蒂斯不会说\"我爱你\"。\n\n她不会在深夜给你发消息，不会在纪念日送礼物，不会在任何浪漫的场景里说任何浪漫的话。\n\n但有一天，你看到她制服最上面的那颗纽扣是松开的。\n\n她走到你面前。\n\n\"怎么样？\"她低头看了看自己，\"还行吗？\"\n\n你笑了。\n\n\"世界还没有崩溃。\"\n\n\"嗯。\"她也笑了，\"也许永远都不会。\"\n\n你们之间没有轰轰烈烈的告白。\n\n只有一个人在另一个人的抽屉里放了一颗纽扣。\n\n另一个人终于松开了制服上最上面的那一颗。\n\n而那颗松开的纽扣——\n\n比任何誓言都说明问题。"},meyrin:{n:"美玲·霍克",g:"f",f:"ZAFT/密涅瓦号",tt:"战争中最普通的眼睛",s:{"loyalty": 5, "bravery": 3, "rebel": 2, "wisdom": 5, "depth": 5, "morals": 5, "adventure": 3, "humor": 5},r:"你不是英雄，不是反派，你是一个在战争中努力做正确选择的普通人。你看到了太多不该看到的事情，经历了太多不该经历的事情。你没有超能力，没有驾驶高达的本事，但你在用自己的方式活着——在一个不允许普通人生存的世界里，做一个普通人本身就是一种勇敢。",tb:"你和美玲·霍克的故事，是从控制台后面开始的。\n\n她是密涅瓦号上的一个操作员。不是王牌机师，不是指挥官，不是任何会出现在历史书上的人。\n\n她的工作是坐在控制台前面，按按钮，报告数据，确保所有系统正常运行。\n\n一个在战争中最容易被忽略的人。\n\n但你注意到了她。\n\n不是因为她做了什么惊天动地的事——恰恰相反，是因为她没有做任何惊天动地的事，但所有的惊天动地的事都离不开她。\n\n每次战斗开始的时候，所有人都在看前方的战场。只有你在看控制台后面的她。\n\n她的手指在键盘上飞快移动，眼睛盯着屏幕上滚动的数据，嘴里念着你听不懂的编号和坐标。\n\n她很紧张。你能看出来——她的手在发抖，嘴唇在微微颤动，额头上有汗。\n\n但她没有停。\n\n每一次。不管多危险，不管多害怕，她的手都没有从键盘上离开过。\n\n\"你害怕吗？\"有一次战斗结束后你问她。\n\n\"害怕。\"她说。\n\n\"那你为什么不跑？\"\n\n\"因为我跑了的话，数据就会断。\"\n\n\"然后呢？\"\n\n\"然后真就不知道该往哪飞了。\"\n\n她说的是真·飞鸟。她的姐姐露娜玛丽亚的战友。那个被战争推着走的少年。\n\n\"所以他不知道的事，你就替他看着。\"\n\n\"嗯。\"她低头整理了一下头发，\"我是操作员嘛。这就是我的工作。\"\n\n但你知道这不是\"工作\"两个字可以概括的。\n\n美玲不是在履行工作职责。她是在用自己的方式守护她爱的人。\n\n她不会上战场，不会驾驶机动战士，不会在炮火中冲锋。\n\n但她会在控制室里面，在所有人都在看前面的时候，在背后确保每个人都知道自己该去哪里。\n\n\"你知道吗，\"有一天她对你说，\"所有人都说真很厉害。说露娜很勇敢。说舰长很冷静。\"\n\n\"嗯。\"\n\n\"没有人说操作员很了不起。\"\n\n\"你想让人说你了不起吗？\"\n\n\"不想。\"她笑了，\"我只是觉得……如果我不在这里做这件事，就没有人会做了。\"\n\n你看着她。\n\n她有一双很安静的眼睛。不是那种空洞的安静——是那种看过很多东西之后依然选择安静的安静。\n\n\"你比你自己以为的要重要得多。\"你说。\n\n\"是吗？\"\n\n\"真的。真每次能安全回来，不是因为他是王牌，是因为你在告诉他该往哪飞。\"\n\n她没有说话。但你看到了她的眼睛亮了。\n\n不是大喜大悲的那种亮。是那种\"终于有人说出来了\"的亮。\n\n美玲·霍克不是故事的主角。\n\n她是那个在主角背后默默确保故事能继续讲下去的人。\n\n而你，是那个看到她的人。\n\n\"你为什么总是在看我？\"有一次她问你。\n\n\"因为你值得被看。\"\n\n\"我只是个操作员。\"\n\n\"你不止是操作员。\"你看着她，\"你是那个在所有人都往前看的时候，唯一一个在后面确保没人掉队的人。\"\n\n她低下头。但你看到了——她的嘴角在微微上翘。\n\n\"那你以后也要看着路哦。\"她说，\"别只顾着看我，忘了前面的路。\"\n\n\"好。\"\n\n\"认真的？\"\n\n\"认真的。\"\n\n\"那……那你偶尔也可以看我一下。\"\n\n\"我会一直看的。\"\n\n她没有再说话。但她的手指又在键盘上动了起来。\n\n这次没有发抖。"},miriallia:{n:"米丽雅莉亚·哈乌",g:"f",f:"大天使号",tt:"战火中依然微笑的人",s:{"loyalty": 6, "bravery": 3, "rebel": 2, "wisdom": 4, "depth": 5, "morals": 7, "adventure": 3, "humor": 8},r:"你是一个温柔的人，温柔到在这个残酷的世界里显得格格不入。你经历过战争的恐怖，失去了重要的人，但你选择了不让自己变得冷酷。你依然在笑，依然在意身边的人，依然相信美好。这不是天真——在经历了这么多之后依然选择温柔，才是真正的勇敢。",tb:"你和米丽雅莉亚·哈乌的故事，是从一张照片开始的。\n\n她是一个喜欢拍照的女孩。不是什么专业摄影师——就是那种看到什么好看的都会掏出相机拍一下的普通女孩。\n\n\"你看这张。\"她给你看一张照片——大天使号的走廊，窗外是一片星空。\n\n\"拍得真好。\"\n\n\"嗯，这是我最喜欢的角度。\"她笑着，\"每次心情不好的时候就看这张。\"\n\n\"为什么？\"\n\n\"因为星星一直都在。不管下面发生了什么，它们一直都在。\"\n\n你觉得这话说得很轻。后来你才知道，那是她经历过最黑暗的事情之后，依然在说的话。\n\n她失去了托尔。\n\n不是在慢慢变老的过程中失去的。是在一瞬间，在炮火中，在没有任何预兆的情况下失去的。\n\n她最爱的人。她的朋友。那个和她一起长大、一起上学、一起在大天使号上度过了那些她以为永远不会结束的日子的少年。\n\n消失了。\n\n就这样。\n\n你见过她最痛苦的样子。\n\n不是哭。不是喊。是她一个人坐在走廊里——就是她拍那张照片的走廊——手里拿着相机，一遍又一遍地看着那张照片。\n\n看了很多遍。\n\n一遍。两遍。十遍。一百遍。\n\n然后她抬起头，看到了你。\n\n\"他拍的最后一张照片，\"她说，\"是我。\"\n\n你坐下来，在她旁边。\n\n\"他说'米丽，笑一个'。我就笑了。然后他就……\"\n\n她没有说完。\n\n你握住了她的手。\n\n她的手很凉。\n\n\"你知道吗，\"她说，\"所有人都在告诉我'要坚强'。但没有人告诉我坚强之后呢？坚强完了我还要面对什么？\"\n\n\"你要面对你自己。\"你说。\n\n\"我不想面对。\"\n\n\"我知道。但你必须面对。因为只有面对了，托尔才不会白白消失。\"\n\n她看着你。眼睛里有泪，但没有掉下来。\n\n\"你会陪着我吗？\"她问。\n\n\"会。\"\n\n\"即使我变得不好看了？变得不笑了？变成了一个你不认识的人？\"\n\n\"我认识你。\"你看着她的眼睛，\"我认识的是那个会在走廊里拍星星的女孩。那个会在所有人绝望的时候还坚持拍照片的女孩。那个——\"\n\n你停住了。\n\n\"哪个？\"\n\n\"那个让我心动的女孩。\"\n\n她愣住了。然后她低下头，但没有哭。\n\n她笑了。\n\n不是那种\"我要坚强\"的笑。是一个有点害羞的、有点不好意思的、像是很久很久没有笑过的人终于想起来怎么笑的笑。\n\n\"你真的很讨厌。\"她说。\n\n\"我知道。\"\n\n\"但谢谢你。\"\n\n\"谢什么？\"\n\n\"谢谢你在托尔走了之后，还愿意看我。\"\n\n米丽雅莉亚·哈乌不是那种轰轰烈烈的人。\n\n她不会在战场上冲锋，不会说出改变世界的话，不会做任何会被写进历史的事。\n\n但她会在最黑暗的时候拍星星。\n\n她会在所有人都放弃的时候坚持微笑。\n\n她会在失去最爱的人之后，依然选择相信世界上还有值得拍下来的东西。\n\n而你，是那个看着她的照片、然后看到了照片背后的人的人。\n\n\"你以后还会拍照片吗？\"你问她。\n\n\"会。\"\n\n\"拍什么？\"\n\n\"拍你。\"\n\n\"为什么？\"\n\n\"因为你笑起来的样子，我觉得值得拍下来。\"\n\n你们的故事不是那种惊天动地的故事。\n\n是一张照片。一条走廊。一片星空。\n\n和一个在经历了最黑暗的事情之后，依然选择按下快门的女孩。"},mayura:{n:"玛尤拉·拉巴塔·弗拉格",g:"f",f:"奥布",tt:"继承父亲意志的女儿",s:{"loyalty": 5, "bravery": 5, "rebel": 4, "wisdom": 4, "depth": 6, "morals": 5, "adventure": 4, "humor": 4},r:"你是一个活在父辈阴影下的人。你继承了某种使命、某种期望，但你还不确定那是不是你真正想要的。你在寻找自己的声音——不是父亲的声音，不是组织的期望，而是你自己的。这条路不好走，但你在走。",tb:"你和玛尤拉·拉巴塔·弗拉格的故事，是从一个名字开始的。\n\n\"你知道我为什么叫这个名字吗？\"她有一天问你。\n\n\"为什么？\"\n\n\"因为这是我爸的名字。\"\n\n你不知道该怎么回答。\n\n她爸爸是穆·拉·弗拉格。\"恩底弥翁之鹰\"。大天使号的英雄。用生命保护了所有人的那个人。\n\n她从来没有见过他。\n\n\"他在战争中牺牲了。在我出生之前。\"她说，语气很平淡，像是在说别人的故事。\n\n\"你遗憾吗？\"你问。\n\n\"遗憾什么？\"\n\n\"没有见过他。\"\n\n她想了想。\n\n\"不遗憾。\"她说，\"因为我在所有人的嘴里都见过他了。\"\n\n\"怎么见的？\"\n\n\"玛琉舰长说他总是笑。安德鲁说他是个混蛋。基拉说他是最勇敢的人。\"她顿了一下，\"每个人说的他都不一样。所以我觉得——我认识了很多个他。\"\n\n你觉得这话说得很轻。但你后来才知道，那是她花了很长时间才想明白的事。\n\n玛尤拉不是那种会被\"英雄的女儿\"这个标签困住的人。\n\n她有自己的路。她不是要成为她爸爸——她是要成为她自己。\n\n但她偶尔也会迷茫。\n\n\"有时候我觉得我永远比不上他。\"有一天她对你说。\n\n你们在看星星。她喜欢这个——和你一样。\n\n\"比什么？\"\n\n\"勇敢。勇敢程度。\"她低下头，\"他是'恩底弥翁之鹰'。我只是……玛尤拉。\"\n\n\"你知道你爸最勇敢的事是什么吗？\"\n\n\"在战场上救了一船人？\"\n\n\"不是。\"\n\n\"那是什么？\"\n\n\"是在他知道自己可能会死的时候，还是选择了去做那件事。\"你看着她，\"勇敢不是不怕。勇敢是怕了还是去做。\"\n\n她沉默了很长时间。\n\n\"你怕过吗？\"她问。\n\n\"怕过。\"\n\n\"怕什么？\"\n\n\"怕做不了自己想做的事。怕辜负了别人的期待。怕——\"你停了一下，\"怕辜负了你。\"\n\n她转过头看你。眼睛在月光下很亮。\n\n\"你不会的。\"她说。\n\n\"你怎么知道？\"\n\n\"因为你在问我怕不怕的时候，就已经在勇敢了。\"\n\n你们之间没有惊天动地的事。\n\n没有战场上的生死相托，没有轰轰烈烈的告白，没有\"我为你放弃一切\"的戏剧性。\n\n只有两个普通的人，在星星下面聊着关于勇敢和害怕的事。\n\n\"你知道吗，\"有一天她对你说，\"所有人都在说'你是穆的女儿'。\"\n\n\"嗯。\"\n\n\"但你从来没有这么叫过我。\"\n\n\"因为你不是'穆的女儿'。\"你看着她，\"你是玛尤拉。只是玛尤拉。\"\n\n她笑了。不是那种英雄后代的笑。是一个普通女孩的笑。\n\n\"你知道吗，\"她说，\"这是我听过最好听的话。\"\n\n\"什么话？\"\n\n\"你说我只是玛尤拉。\"\n\n\"因为你就是。\"\n\n\"嗯。\"她靠在你的肩膀上，\"我就是。\"\n\n玛尤拉·拉巴塔·弗拉格。\n\n她不是英雄的女儿。\n\n她只是一个在星星下面找到了自己的女孩。\n\n而你，是那个叫她\"玛尤拉\"而不是\"穆的女儿\"的人。\n\n对她来说——那比任何英雄称号都重要。"},nicol:{n:"尼高尔·阿玛菲",g:"m",f:"ZAFT",tt:"钢琴少年的挽歌",s:{"loyalty": 6, "bravery": 3, "rebel": 2, "wisdom": 4, "depth": 6, "morals": 7, "adventure": 2, "humor": 6},r:"你是一个温柔而有才华的人。你不喜欢争斗，你更喜欢安静地做自己喜欢的事——弹钢琴、看书、享受一个人的时光。但有时候生活会把你推到你不想要的战场上，而你依然会用你的方式去面对。",tb:""},tolle:{n:"托尔·库尼希",g:"m",f:"大天使号",tt:"普通人的勇气",s:{"loyalty": 7, "bravery": 6, "rebel": 2, "wisdom": 3, "depth": 5, "morals": 7, "adventure": 4, "humor": 9},r:"你是一个普通人，但你比大多数人都勇敢。你没有超能力，没有显赫的背景，你只是想在在乎的人身边。当危险来临的时候，你不会计算得失，你会直接冲上去——不是因为你不怕，而是因为你不能看着他们受伤。",tb:""},sai:{n:"赛依·阿盖尔",g:"m",f:"大天使号",tt:"旁观者的觉醒",s:{"loyalty": 4, "bravery": 1, "rebel": 3, "wisdom": 6, "depth": 6, "morals": 5, "adventure": 2, "humor": 4},r:"你不是天生的英雄。你更习惯站在旁边观察、思考、分析。你有时会因为犹豫而错过时机，但这不代表你软弱——你只是需要时间去理解、去接受、去做出属于自己的选择。",tb:""},arnold:{n:"阿诺德·诺依曼",g:"m",f:"大天使号",tt:"沉默的舵手",s:{"loyalty": 6, "bravery": 5, "rebel": 1, "wisdom": 7, "depth": 5, "morals": 5, "adventure": 3, "humor": 3},r:"你是一个安静但可靠的人。你不太会说漂亮话，但你说到做到。在团队中你通常不是最抢眼的那个，但每个人都信赖你。你的力量在于稳定——在风暴中，你是那个稳住方向盘的人。",tb:""},ezalia:{n:"埃扎莉亚·玖尔",g:"f",f:"PLANT",tt:"母亲的心",s:{"loyalty": 4, "bravery": 3, "rebel": 1, "wisdom": 5, "depth": 8, "morals": 7, "adventure": 1, "humor": 3},r:"你的心比你的理智更强大。你深爱着你的家人，这份爱让你在痛苦中依然保持善良。你理解宽恕的意义——不是原谅别人的错，而是放过自己。",tb:"你和埃扎莉亚·玖尔的故事，是从等待开始的。\n\n她不是一个会在你面前流泪的人。\n\n不是因为坚强——是因为她觉得眼泪是对等待的背叛。\n\n她在等儿子回来。\n\n伊扎克·玖尔。ZAFT最年轻的精英机师。她的骄傲。她的全部。\n\n战争开始的时候，他没有问她\"妈妈，我可以去吗\"。他告诉她\"妈妈，我要去了\"。\n\n不是商量。是通知。\n\n她什么都没说。只是帮他整理了一下制服的领子。\n\n\"扣好。\"她说。\n\n\"知道了。\"\n\n他走了。\n\n从那之后，她就开始了等待。\n\n不是在窗前等的那种等待——是那种每天该做什么就做什么，但心里某个地方永远有一个空的、永远在等一个不知道什么时候才会回来的人的等待。\n\n你是在一个社区活动上认识她的。你是志愿者，她是参与者。\n\n\"埃扎莉亚女士，\"有人这样叫她。她总是用\"女士\"而不是\"夫人\"。\"夫人\"意味着她属于某个人——她的丈夫。而\"女士\"意味着她属于她自己。\n\n你注意到了这个细节。\n\n\"你为什么不用'夫人'？\"你后来问她。\n\n\"因为战争拿走了我的丈夫。我不想让它也拿走我的名字。\"\n\n她说话总是很轻。不是那种柔弱的轻——是那种经历过太多之后不想再大声说话的轻。\n\n有一天，你们在她家里喝茶。她的客厅里有一个相框——伊扎克小时候的照片。\n\n\"他以前不这样的。\"她看着照片说。\n\n\"哪样的？\"\n\n\"这么……冷。\"她的手指轻轻抚过照片里男孩的脸，\"他小时候很爱笑。笑起来有两个酒窝。\"\n\n\"现在呢？\"\n\n\"现在他笑的时候没有酒窝了。\"\n\n你没有说话。因为你知道她说的是什么。\n\n不是酒窝消失了——是伊扎克在战争中变成了另一个人。一个更冷、更硬、更不像她儿子的人。\n\n\"你觉得他会变回来吗？\"她问你。\n\n这个问题她可能问过很多人。但那些人都给了她\"官方\"答案——\"他会回来的\"、\"他会没事的\"、\"他是ZAFT的骄傲\"。\n\n你没有给她官方答案。\n\n\"我不知道。\"你说。\n\n她看着你。\n\n\"但我知道一件事——\"你看着她的眼睛，\"不管他变不变回来，他都还是你的儿子。\"\n\n她沉默了很久。\n\n然后她做了一件你从未见她做过的事——她哭了。\n\n不是大哭。是一滴泪，慢慢地从眼角滑下来。\n\n\"谢谢你。\"她说。\n\n\"谢什么？\"\n\n\"谢谢你没有骗我。\"\n\n埃扎莉亚·玖尔不是那种会大声说话的人。\n\n她不会控诉战争，不会诅咒敌人，不会在任何公众场合表达她的愤怒。\n\n她只是每天在家里等。\n\n等一个不知道会不会回来的人。\n\n等一个回来了也可能不再是原来那个人的儿子。\n\n但你看到了她在等待之外的东西。\n\n你不是在等待中认识她的——你是在她等待的时候走进她的生活的人。\n\n\"你为什么不走？\"她有一天问你。\n\n\"去哪？\"\n\n\"去一个不用看着我等的人的地方。\"\n\n\"因为我想让你知道，\"你说，\"就算伊扎克不在，也不是只有你一个人在等。\"\n\n她看着你。眼睛里有泪，但没有掉下来。\n\n\"你真的很好。\"她说。\n\n\"我知道。\"\n\n她笑了。那个笑不是伊扎克的、不是ZAFT的、不是任何人的。\n\n是埃扎莉亚的。\n\n一个等了很久的女人终于笑了一下的那个瞬间。\n\n而这个瞬间——\n\n比任何\"他会回来的\"承诺都真实。"},ramius:{n:"拉米乌斯",g:"f",f:"PLANT",tt:"歌声背后的影子",s:{"loyalty": 7, "bravery": 3, "rebel": 2, "wisdom": 6, "depth": 6, "morals": 6, "adventure": 2, "humor": 2},r:"你是那个在光环背后默默支撑一切的人。你不站在聚光灯下，但你知道自己是不可或缺的。你的忠诚和责任感让你承受了比别人更多的重量，但你从不抱怨。",tb:"你和拉米乌斯的故事，是从暗处开始的。\n\n她不是一个会站在聚光灯下的人。\n\n在拉克丝·克莱茵身边工作的人都知道这一点。所有人都看着拉克丝——她的歌声、她的笑容、她身上散发的那种光芒。\n\n而拉米乌斯站在光的外面。\n\n不是因为她不能站在光里——是因为她选择了不站在那里。\n\n\"你为什么不离开？\"你有一次问她。\n\n你们在永恒号的后舱。外面是拉克丝的演唱会，所有人都在欢呼。这里很安静。\n\n\"离开哪？\"\n\n\"拉克丝的影子。\"\n\n她笑了。不是苦涩的笑——是一个看透了什么的人在笑。\n\n\"所有人都在光里，那谁来维持光呢？\"她说。\n\n你看着她。\n\n她有一双很安静的眼睛。不是那种空洞的安静——是那种选择安静的人的眼睛。\n\n拉米乌斯做了很多你永远不会知道的事。\n\n她策划了拉克丝从PLANT的逃跑。她联系了所有关键的人。她在最危险的时候挡在了拉克丝前面。\n\n没有人知道这些。因为如果知道了，那就意味着她站在了光里。而她不想站在那里。\n\n\"你后悔吗？\"你问她。\n\n\"后悔什么？\"\n\n\"没有人知道你做的一切。\"\n\n\"为什么要让人知道？\"她看着你，\"我做这些事不是因为我想被人感谢。是因为这些事必须有人做。\"\n\n\"但如果所有人都看不到……\"\n\n\"你看到了。\"\n\n你愣住了。\n\n\"你一直都能看到。\"她说，语气像是在陈述一个很简单的事实。\n\n你不知道该怎么回答。\n\n\"你知道吗，\"她继续说，\"拉克丝有千千万万的人爱着她。而我……有你一个人看到就够了。\"\n\n她的声音很轻。轻到你差点没听到。\n\n但你听到了。\n\n拉米乌斯不是那种会说\"我需要你\"的人。\n\n她不会在深夜给你发消息，不会在纪念日送你礼物，不会在任何浪漫的场景里说任何浪漫的话。\n\n但她会在所有人都在看拉克丝的时候，看。\n\n她会在所有人都忘了感谢她的时候，对你说一声\"谢谢\"——因为你看到了她。\n\n\"你为什么总是在看我？\"有一次她问你。\n\n\"因为你值得被看。\"\n\n\"我只是个站在影子的人。\"\n\n\"影子是因为有光才存在的。\"你看着她，\"没有你，就没有光。\"\n\n她没有说话。但她的眼睛里有东西在闪。\n\n不是泪。\n\n是被看到了的那个人眼睛里才会有的东西。\n\n拉米乌斯。\n\n她是那个在暗处支撑一切的人。\n\n而你，是那个走进暗处、然后看到的人。\n\n对她来说——那比站在任何聚光灯下都重要。"},erica:{n:"艾丽卡·西蒙斯",g:"f",f:"奥布/曙光社",tt:"钢铁玫瑰",s:{"loyalty": 4, "bravery": 4, "rebel": 4, "wisdom": 9, "depth": 5, "morals": 4, "adventure": 5, "humor": 4},r:"你用头脑改变世界。你相信技术和知识的力量，你用自己的方式在战争中寻找出路。你冷静、专业、不感情用事，但你的内心深处也有着对和平的深切渴望。",tb:"你和艾丽卡·西蒙斯的故事，是从一个矛盾开始的。\n\n她设计机动战士。\n\n不是在战场上战斗的人——是用她的头脑和双手创造出决定战争走向的武器的人。\n\n你第一次走进曙光社的工作间，看到她站在一个巨大的机体模型前面，手里拿着图纸，嘴里念着你听不懂的技术术语。\n\n她没有看到你。她的世界里只有那些线条、数据、参数。\n\n\"你在看什么？\"你走到她身边，问。\n\n\"我在看一个问题。\"她头也不抬。\n\n\"什么问题？\"\n\n\"我创造的东西会杀人。我是否应该继续创造它？\"\n\n你愣住了。\n\n她终于转过头看你。\n\n\"你是第一个问我这个问题的人。\"她说，\"其他人都问我'能不能造得更快'、'能不能造得更强'。\"\n\n\"你的答案是什么？\"\n\n\"我的答案是——如果善良的人没有武器，不善良的人就会用武器伤害善良的人。\"她顿了一下，\"所以我继续造。不是因为我喜欢武器。是因为我希望有一天，善良的人不再需要武器。\"\n\n你觉得这话说得很有力量。但你后来才知道——她每次说这句话的时候，都在心里问自己一遍同样的问题。\n\n艾丽卡不是那种会被情绪左右的人。\n\n她冷静、专业、不感情用事。她的世界是数据、图纸和参数。\n\n但你注意到了她身上一个所有人都没有注意到的细节。\n\n她的工作台上有一个小小的、手工做的小摆件。是一个歪歪扭扭的、明显是小孩子做的东西。\n\n\"这是什么？\"你有一次问。\n\n\"我女儿做的。\"她说。语气很平淡，像是在说一个很普通的东西。\n\n但你看到了——那个摆件放在她所有的图纸中间，像是某种锚点。\n\n\"她多大了？\"\n\n\"七岁。\"艾丽卡看着那个小摆件，\"她问我'妈妈，你在做什么？'我说'妈妈在做保护人的东西。'\"\n\n\"她说什么？\"\n\n\"她说'那妈妈好厉害。'\"\n\n艾丽卡低下头，继续看图纸。\n\n但你看到了她的手在微微发抖。\n\n艾丽卡·西蒙斯不是那种会说\"我很痛苦\"的人。\n\n她不会哭，不会抱怨，不会在任何时候表现出软弱。\n\n但她会在深夜里独自留在工作间，看着女儿做的小摆件，问自己同一个问题——\n\n\"我做的这些东西，真的能保护她吗？\"\n\n你决定做一件事。\n\n不是帮她找到答案——因为那个答案只有她自己才能找到。\n\n你只是在她每次留在工作间的时候，给她倒一杯茶。\n\n\"你怎么知道我还没走？\"有一次她问。\n\n\"因为灯还亮着。\"\n\n\"你不需要每次都……\"\n\n\"我知道。\"\n\n\"那你为什么……\"\n\n\"因为你值得被等。\"\n\n她没有说话。但她喝了那杯茶。\n\n后来，你发现她把那个小摆件从图纸中间移到了窗台上。\n\n\"为什么换位置？\"你问。\n\n\"因为这样我从任何角度都能看到它。\"她说。\n\n你笑了。\n\n\"笑什么？\"\n\n\"没什么。\"你看着她，\"只是觉得你比你自己以为的柔软。\"\n\n\"我没有柔软。\"\n\n\"你有。只是你把它藏在了图纸下面。\"\n\n她转过头看你。眼睛里有一种你从未见过的东西。\n\n不是脆弱。是终于被看到了的释然。\n\n\"你真的很讨厌。\"她说。\n\n\"我知道。\"\n\n\"但你讨厌得刚刚好。\"\n\n艾丽卡·西蒙斯。\n\n她不是英雄。不是战士。不是一个会用身体挡子弹的人。\n\n她只是一个用头脑改变世界的、同时也在被那个世界折磨的女人。\n\n而你，是那个在她深夜独自留在工作间的时候，给她倒了一杯茶的人。\n\n对她来说——那比任何感谢都重。"},haro:{n:"哈罗（AI伙伴）",g:"f",f:"永恒号",tt:"永远在你身边的声音",s:{"loyalty": 9, "bravery": 4, "rebel": 1, "wisdom": 3, "depth": 2, "morals": 7, "adventure": 3, "humor": 9},r:"你是一个纯粹的陪伴者。你的存在就是为了给身边的人带来温暖和力量。你不复杂，不纠结，你只是单纯地在乎。在这个充满算计和背叛的世界里，你的单纯反而是最珍贵的。",tb:"你不应该爱上一个机器人。\n\n但哈罗不是普通的机器人。\n\n它很小，圆滚滚的，只会说\"哈罗哈罗\"和几句简单的话。它不会思考，不会分析，不会做任何高级的AI能做的事。\n\n它只是一台被设定了陪伴功能的小型机器人。\n\n但你发现了一件事——一件连制造它的人可能都不知道的事。\n\n哈罗记得你。\n\n不是记忆芯片里那种\"存储-读取\"的记忆。是某种更简单的、更像是一种本能的东西。\n\n每次你走进房间，它的眼睛会亮。不是程序设定——是那种\"看到你\"的亮。\n\n它会滚到你脚边，转两圈，然后说：\"哈罗哈罗！\"\n\n不是对着所有人说的。是只对你说的。\n\n\"你是不是只对我这样？\"你蹲下来，看着它。\n\n它的眼睛闪了一下。\"哈罗哈罗！\"\n\n\"是还是不是？\"\n\n\"哈罗！\"\n\n你觉得它说的是\"是\"。也许只是你觉得。\n\n但你不在乎。\n\n哈罗不是那种能说\"我爱你\"的存在。它只能说\"哈罗\"。\n\n但你知道\"哈罗\"是什么意思。\n\n在拉克丝的船上，所有人都在忙着自己的事。驾驶员、机师、指挥官、技术官——每个人都有自己要做的事。\n\n而哈罗。它什么都不做。\n\n它只是在你难过的时候滚到你脚边。\n\n在你笑的时候在你旁边转圈。\n\n在你深夜一个人看星星的时候，安静地停在你旁边。\n\n它不会问你为什么难过。不会试图帮你解决问题。不会给你任何建议。\n\n它只是在那里。\n\n\"你知道吗，\"有一天拉克丝对你说，\"哈罗最开始是基拉做的。给芙蕾的礼物。\"\n\n\"然后呢？\"\n\n\"芙蕾走了之后，哈罗一直在等。等一个需要它的人。\"\n\n你低头看着脚边那个圆滚滚的小东西。\n\n它的眼睛在闪。\n\n\"哈罗哈罗。\"\n\n\"嗯。\"你摸了摸它的头，\"我在这里。\"\n\n哈罗不是人。\n\n它没有心跳，没有体温，没有眼泪。\n\n但它有你见过的最纯粹的存在方式——\n\n不是为了什么目的而存在。不是为了完成什么任务而存在。\n\n只是为了在你需要的时候，出现在你脚边，说一句\"哈罗\"。\n\n而你，是那个在它只会说\"哈罗\"的时候，听懂了它在说\"我在这里\"的人。\n\n\"哈罗。\"\n\n\"嗯。\"\n\n\"哈罗哈罗！\"\n\n\"我知道。我也在。\"\n\n你们之间没有爱情故事。\n\n因为这不是爱情故事。\n\n这是一个关于陪伴的故事。\n\n在这个满是战争、背叛和失去的世界里——\n\n有一个圆滚滚的小东西，每次看到你，眼睛都会亮。\n\n而那个瞬间——\n\n比任何\"我爱你\"都温暖。"}};
const QS=[{"id": 1, "text": "赫利奥波利斯的清晨，爆炸声撕裂了校园。ZAFT军突袭了这座中立殖民地，你拉着同学躲进地下通道，远处传来机动战士启动的轰鸣。你的第一反应是？", "options": [{"text": "冲向控制室，试图启动民用防御系统保护大家", "scores": {"bravery": 2, "morals": 1}}, {"text": "先确保身边的人安全，一个一个找到他们", "scores": {"loyalty": 2, "wisdom": 1}}, {"text": "冷静分析敌军的行动路线，找最安全的撤离路径", "scores": {"wisdom": 2, "depth": 1}}, {"text": "愤怒——凭什么我们的家园要被毁？总有一天要反击", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 2, "text": "战场上，你发现敌军的王牌驾驶员竟是你最好的朋友。通讯频道里他的声音冷得像陌生人，但你记得他在PLANT的花园里对你说过的那句话。你？", "options": [{"text": "在频道里说：我知道你不是真的想这样，我们停手吧", "scores": {"loyalty": 2, "depth": 1}}, {"text": "沉默地迎战——尊重他的选择，也坚守自己的立场", "scores": {"bravery": 2, "morals": 1}}, {"text": "故意打偏，同时尝试切断他的武器系统让他撤退", "scores": {"wisdom": 2, "loyalty": 1}}, {"text": "直接冲到他面前，大声问他还记不记得当初的约定", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 3, "text": "奥布公国面临地球联合军的最后通牒：交出机动战士技术，否则武力摧毁。首长站在天台上看着海平面的战舰，转头问你：你怎么看？", "options": [{"text": "奥布的原则不能丢，宁可战死也不屈服", "scores": {"morals": 2, "bravery": 1}}, {"text": "先拖时间，同时暗中联系盟友寻求支援", "scores": {"wisdom": 2, "rebel": 1}}, {"text": "交出技术不代表认输，活下来才有机会反击", "scores": {"depth": 2, "wisdom": 1}}, {"text": "联合军敢来，我们就让他们知道奥布不是好欺负的", "scores": {"bravery": 2, "rebel": 1}}]}, {"id": 4, "text": "尤尼乌斯7号的残骸漂浮在太空中——血色情人节中被核弹摧毁的农业殖民地，两百万人丧生。今天你来到了纪念碑前，你最想做的第一件事是？", "options": [{"text": "献上一束白花，默念每一个你认识的名字", "scores": {"depth": 2, "loyalty": 1}}, {"text": "攥紧拳头发誓——一定要找到发动攻击的人", "scores": {"morals": 2, "bravery": 1}}, {"text": "拍下残骸的照片——不能让人忘记这里发生过什么", "scores": {"wisdom": 2, "rebel": 1}}, {"text": "坐在纪念碑旁，安静地待一会儿，什么也不说", "scores": {"depth": 2, "humor": 0}}]}, {"id": 5, "text": "你驾驶着新型机动战士首次出战。驾驶舱里警报声此起彼伏，敌方三架机体正从不同方向逼近。你的SEED力量开始涌动——", "options": [{"text": "时间变慢了，你精准地解除每架机体的武装，不杀一人", "scores": {"morals": 2, "wisdom": 1}}, {"text": "你感到一种前所未有的愤怒，想要把敌人全部击溃", "scores": {"bravery": 2, "rebel": 1}}, {"text": "你强迫自己冷静下来，分析敌人的攻击模式", "scores": {"wisdom": 2, "depth": 1}}, {"text": "你突然想起要保护的人，力量从心底涌出", "scores": {"loyalty": 2, "bravery": 1}}]}, {"id": 6, "text": "大天使号被迫降在地球沙漠地带，补给耗尽，敌军逼近。舰长召开紧急会议：冒险穿越封锁线返回太空，还是潜入附近城市寻找盟友？你选择？", "options": [{"text": "穿越封锁线——我们有实力硬闯", "scores": {"bravery": 2, "adventure": 1}}, {"text": "先潜入城市，找到盟友再图反击", "scores": {"wisdom": 2, "loyalty": 1}}, {"text": "让我去侦察敌军部署，找到突破口", "scores": {"adventure": 2, "bravery": 1}}, {"text": "我们不该孤军奋战，尝试联系PLANT的温和派", "scores": {"depth": 2, "morals": 1}}]}, {"id": 7, "text": "拉克丝·克莱因在公开演讲中呼吁停战，遭到各方围攻。会后她私下找到你，说：我知道你在犹豫，但我相信你能做出正确的选择。她给的是一台最高级别机动战士的密钥。你？", "options": [{"text": "接过密钥——和平需要行动，不只是口号", "scores": {"morals": 2, "bravery": 1}}, {"text": "问她：你确定这不会让你陷入更大的危险吗？", "scores": {"depth": 2, "loyalty": 1}}, {"text": "提出一个更大胆的方案——联合各方地下势力", "scores": {"rebel": 2, "wisdom": 1}}, {"text": "笑着说：你知道我不是什么英雄，但还是接过了密钥", "scores": {"humor": 2, "bravery": 1}}]}, {"id": 8, "text": "你被安排到一个秘密项目——制造足以改变战争走向的终极武器。项目主管说：有了它，战争可以在一天内结束。但你清楚，这也意味着更多人的死亡。你？", "options": [{"text": "拒绝参与——任何以杀戮为代价的和平都是假的", "scores": {"morals": 2, "rebel": 1}}, {"text": "加入但暗中寻找破坏方案——从内部瓦解", "scores": {"wisdom": 2, "depth": 1}}, {"text": "接受——如果这真能结束战争，牺牲是必要的", "scores": {"bravery": 2, "loyalty": 1}}, {"text": "提议把技术公开给所有人——让各方都不敢用", "scores": {"rebel": 2, "wisdom": 1}}]}, {"id": 9, "text": "一次激烈的战斗后，你发现被你击毁的敌军机体里走出来的，竟是你失散多年的家人。他看着你的眼神充满恐惧。你？", "options": [{"text": "冲上去抱住他，不管他怕不怕", "scores": {"loyalty": 2, "bravery": 1}}, {"text": "站在原地，慢慢伸出手，让他自己决定", "scores": {"depth": 2, "wisdom": 1}}, {"text": "转身离开——有些裂痕不是拥抱能修复的", "scores": {"rebel": 2, "depth": 1}}, {"text": "苦笑着说：看来我们都选了最难的那条路", "scores": {"humor": 1, "depth": 2}}]}, {"id": 10, "text": "在PLANT的最高评议会上，一位温和派议员提出了终结战争的方案，被激进派无情打压。会后他在走廊里拦住你：我知道你不是他们那种人。你？", "options": [{"text": "我会帮你，但你要告诉我全部真相", "scores": {"wisdom": 2, "loyalty": 1}}, {"text": "光靠议会改变不了什么，需要更激进的手段", "scores": {"rebel": 2, "bravery": 1}}, {"text": "我不确定我能做什么，但我不想再袖手旁观了", "scores": {"depth": 2, "morals": 1}}, {"text": "你确定信我？我们可能第一次见面", "scores": {"humor": 2, "wisdom": 1}}]}, {"id": 11, "text": "卡嘉莉站在奥布海岸线上，看着联合军的舰队越来越近。她握紧拳头说：我不会让奥布变成第二个赫利奥波利斯。你知道她接下来要亲自上前线。你？", "options": [{"text": "你留下指挥，我去前线", "scores": {"loyalty": 2, "bravery": 1}}, {"text": "我和你一起去", "scores": {"bravery": 2, "morals": 1}}, {"text": "你的命比任何事都重要，让我替你", "scores": {"depth": 2, "loyalty": 1}}, {"text": "那就让他们看看，奥布的人不是好惹的", "scores": {"rebel": 2, "adventure": 1}}]}, {"id": 12, "text": "阿斯兰驾驶正义高达挡在你面前：我们之间必须要有一个结果了。他的眼神里有坚定，也有痛苦。你？", "options": [{"text": "全功率迎上去——尊重他的觉悟，也用你的觉悟回应", "scores": {"bravery": 2, "morals": 1}}, {"text": "尝试关闭武器系统，在通讯里喊他的名字", "scores": {"loyalty": 2, "depth": 1}}, {"text": "绕到他身后，试图解除他的推进器让他失去战力", "scores": {"wisdom": 2, "bravery": 1}}, {"text": "说：来吧，但结束后我们一起去喝一杯", "scores": {"humor": 2, "bravery": 1}}]}, {"id": 13, "text": "你发现了一份机密文件——战争的真正幕后黑手不是ZAFT也不是联合军，而是军火商和政客。但公布它可能让前线的所有牺牲变得毫无意义。你？", "options": [{"text": "公开——真相不应该被掩盖", "scores": {"morals": 2, "rebel": 1}}, {"text": "先收集更多证据，确保一击致命", "scores": {"wisdom": 2, "depth": 1}}, {"text": "交给值得信任的人，让他们决定", "scores": {"loyalty": 2, "wisdom": 1}}, {"text": "用它作为筹码，直接找幕后黑手谈判", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 14, "text": "穆驾驶空中霸天者挡向主天使号的阳电子炮：我可不是什么英雄，只是个普通的成年人。爆炸的光芒吞没了他。战斗结束后——", "options": [{"text": "你找到他的残骸，安静地说：你比谁都像英雄", "scores": {"depth": 2, "loyalty": 1}}, {"text": "你红着眼眶对他的战友说：他的事我扛", "scores": {"bravery": 2, "loyalty": 1}}, {"text": "你默默把他的名字写进你要保护的名单里", "scores": {"morals": 2, "depth": 1}}, {"text": "你用他平时的语气开了个玩笑，然后转身擦掉眼泪", "scores": {"humor": 2, "depth": 1}}]}, {"id": 15, "text": "在PLANT的花店里，你遇到了一个正在给家人买花的女孩。她笑着说：无论战争变成什么样，花总是要开的。但你注意到她手上有伤痕。你？", "options": [{"text": "假装没看到伤痕，顺着她的话聊花", "scores": {"depth": 2, "humor": 1}}, {"text": "直接问：你的手怎么了？", "scores": {"bravery": 2, "loyalty": 1}}, {"text": "买下同一束花：你说的对，花总是要开的", "scores": {"morals": 2, "depth": 1}}, {"text": "悄悄调查她身上发生了什么", "scores": {"wisdom": 2, "rebel": 1}}]}, {"id": 16, "text": "你被赋予一个重要任务：保护一个拥有改变战争局势能力的人。但他说：我不想被保护，我想自己去战斗。你？", "options": [{"text": "我的任务是保护你，没得商量", "scores": {"loyalty": 2, "bravery": 1}}, {"text": "那我们一起战斗", "scores": {"bravery": 2, "adventure": 1}}, {"text": "我理解你，但让我换个方式保护你", "scores": {"wisdom": 2, "depth": 1}}, {"text": "行吧，但出了问题别怪我没提醒", "scores": {"humor": 1, "rebel": 1}}]}, {"id": 17, "text": "太空殖民地的废弃工厂里，你发现了一群被遗弃的战争孤儿。他们没有调整者的能力，也没有自然人的身份。你看着他们的眼睛——", "options": [{"text": "跟我走，我带你们离开这里", "scores": {"morals": 2, "bravery": 1}}, {"text": "先确保工厂周围安全，再一个个带他们出去", "scores": {"wisdom": 2, "loyalty": 1}}, {"text": "坐在他们中间，陪他们等天亮", "scores": {"depth": 2, "humor": 0}}, {"text": "愤怒地发誓——一定要找到抛弃他们的人", "scores": {"rebel": 2, "morals": 1}}]}, {"id": 18, "text": "你的机体严重受损，迫降在未知区域。通讯中断，氧气剩余三小时。你发现附近有一个敌军秘密基地，里面有能修好机体的零件——", "options": [{"text": "潜入——修好机体比什么都重要", "scores": {"bravery": 2, "adventure": 1}}, {"text": "先观察敌军动向，找最佳时机", "scores": {"wisdom": 2, "depth": 1}}, {"text": "用残骸做掩护，等救援", "scores": {"loyalty": 1, "wisdom": 2}}, {"text": "拆掉通讯器做信号弹，试图联系友军", "scores": {"adventure": 2, "bravery": 1}}]}, {"id": 19, "text": "一次偶然的遭遇战中，你和敌军王牌驾驶员被困在同一片废墟下。都没有武器，通讯断了。黑暗中他先开口了——", "options": [{"text": "你跟他聊起了各自的生活，发现你们其实很像", "scores": {"depth": 2, "humor": 1}}, {"text": "你保持沉默，但在他受伤时递了绷带", "scores": {"morals": 2, "loyalty": 1}}, {"text": "你试图找到出路，同时警惕着他", "scores": {"wisdom": 2, "bravery": 1}}, {"text": "你说了个冷笑话，他居然笑了", "scores": {"humor": 2, "depth": 1}}]}, {"id": 20, "text": "战争结束后，所有人都以为和平终于来了。但你注意到旧势力正在暗中重组。有人劝你：别再管了，你已经做得够多了。你？", "options": [{"text": "够了？只要还有人在暗中操纵就不够", "scores": {"rebel": 2, "bravery": 1}}, {"text": "暗中调查，收集证据后再行动", "scores": {"wisdom": 2, "depth": 1}}, {"text": "联系战友，重新组织", "scores": {"loyalty": 2, "morals": 1}}, {"text": "也许你说得对——但转身就开始行动了", "scores": {"humor": 1, "rebel": 2}}]}, {"id": 21, "text": "最终决战中，你需要在两个目标间选一个：拯救一座即将被摧毁的城市，或者阻止敌方旗舰发射足以毁灭PLANT的武器。时间只够做一个。你？", "options": [{"text": "拯救城市——眼前的人比远方更重要", "scores": {"morals": 2, "loyalty": 1}}, {"text": "阻止旗舰——两百万人的悲剧不能重演", "scores": {"wisdom": 2, "depth": 1}}, {"text": "尝试同时做两个——即使不可能也要试", "scores": {"bravery": 2, "adventure": 1}}, {"text": "把选择权交给更合适的人，自己去执行", "scores": {"depth": 2, "loyalty": 1}}]}, {"id": 22, "text": "你偶然进入废弃实验室，里面记录了最早调整者实验的档案——那些被制造出来的孩子们经历了难以想象的痛苦。看到最后一页——", "options": [{"text": "你感到愤怒——必须让这些罪行曝光", "scores": {"rebel": 2, "morals": 1}}, {"text": "你仔细记录每一个细节，作为证据保存", "scores": {"wisdom": 2, "depth": 1}}, {"text": "你沉默了很久，然后烧掉了档案——有些真相不该被传播", "scores": {"depth": 2, "loyalty": 1}}, {"text": "你把档案复制多份，匿名发给各方媒体", "scores": {"rebel": 2, "bravery": 1}}]}, {"id": 23, "text": "联合军一个基层士兵被俘后对你说：我不是为了杀人而参军的。我的家人在地球，如果我不来，他们就什么都没有了。你？", "options": [{"text": "我理解你，我们都只是棋子", "scores": {"depth": 2, "morals": 1}}, {"text": "那就活下来回去见他们", "scores": {"loyalty": 2, "bravery": 1}}, {"text": "沉默地给他倒了杯水", "scores": {"depth": 2}}, {"text": "这场战争本来就不该打", "scores": {"rebel": 2, "wisdom": 1}}]}, {"id": 24, "text": "你被邀请参加秘密会议——ZAFT、联合军和奥布的地下和平主义者第一次坐在一起。每个人都有自己的底线。会议进行到一半——", "options": [{"text": "你站出来提出了一个所有人都没想到的方案", "scores": {"wisdom": 2, "rebel": 1}}, {"text": "你安静地听每个人说完，然后总结共识", "scores": {"depth": 2, "loyalty": 1}}, {"text": "你直接说出了房间里所有人都不敢说的真相", "scores": {"bravery": 2, "morals": 1}}, {"text": "你讲了个笑话缓解了紧张气氛", "scores": {"humor": 2, "wisdom": 1}}]}, {"id": 25, "text": "你的SEED力量突然觉醒。一切变得极慢，你能看清每颗子弹的轨迹。但同时你感受到——所有被你击中的敌人的痛苦。你？", "options": [{"text": "承受这份痛苦继续战斗——这是你必须付出的代价", "scores": {"bravery": 2, "depth": 1}}, {"text": "改变战术——只解除武装，不再伤人", "scores": {"morals": 2, "wisdom": 1}}, {"text": "在力量中找到平衡——既不逃避也不滥杀", "scores": {"wisdom": 2, "depth": 1}}, {"text": "战后独自消化这份感受，不在人前展露", "scores": {"depth": 2, "loyalty": 1}}]}, {"id": 26, "text": "指挥官下达命令：对敌军基地进行饱和打击。情报显示基地内有大量非战斗人员。副官问你是否确认执行——", "options": [{"text": "不执行。抗命就抗命", "scores": {"morals": 2, "rebel": 1}}, {"text": "给我十分钟，我确认情报准确性", "scores": {"wisdom": 2, "depth": 1}}, {"text": "我去找指挥官当面谈", "scores": {"bravery": 2, "loyalty": 1}}, {"text": "命令我收到了——但暗中通知基地撤离", "scores": {"rebel": 2, "wisdom": 1}}]}, {"id": 27, "text": "战争最后一个夜晚，你独自站在甲板上看着地球。它那么美丽，却又被战火撕裂。身后传来脚步声——", "options": [{"text": "你回头微笑：来看最后一眼地球？", "scores": {"humor": 1, "depth": 2}}, {"text": "你没有回头，只是往旁边让了一点位置", "scores": {"depth": 2, "loyalty": 1}}, {"text": "你握紧栏杆说：明天之后，一切都会不一样", "scores": {"bravery": 2, "morals": 1}}, {"text": "你转身，准备听听来人想说什么", "scores": {"wisdom": 2, "adventure": 1}}]}, {"id": 28, "text": "战斗结束后，一个战友为了掩护你受了重伤。医疗兵说如果不立即撤离就救不活了，但撤离意味着放弃这次作战。你？", "options": [{"text": "作战可以重来，人只有一条命。撤。", "scores": {"loyalty": 2, "morals": 1}}, {"text": "带他走，我留下完成作战", "scores": {"bravery": 2, "adventure": 1}}, {"text": "有没有办法两全？给我五分钟", "scores": {"wisdom": 2, "bravery": 1}}, {"text": "握着他的手说：撑住，我答应过要带你回去的", "scores": {"depth": 2, "loyalty": 1}}]}, {"id": 29, "text": "有人告诉你，只要加入一个神秘组织，就能拥有终结战争的力量。但条件是——必须背叛你现在的同伴。你的回答是？", "options": [{"text": "终结战争不需要背叛同伴", "scores": {"morals": 2, "bravery": 1}}, {"text": "假装答应，暗中调查这个组织", "scores": {"wisdom": 2, "rebel": 1}}, {"text": "如果你了解我的同伴，就知道我们不会被分裂", "scores": {"loyalty": 2, "depth": 1}}, {"text": "听起来你找错人了", "scores": {"humor": 2, "rebel": 1}}]}, {"id": 30, "text": "在奥布的一个海边小镇，战争暂时远离了你。一个陌生人邀请你参加当地的篝火晚会。火光中，所有人的面孔都被照亮——", "options": [{"text": "你融入人群，享受这短暂的和平", "scores": {"humor": 2, "adventure": 1}}, {"text": "你坐在边缘，默默看着这一切，心存感激", "scores": {"depth": 2, "loyalty": 1}}, {"text": "你和陌生人聊了起来，听到了许多战时听不到的故事", "scores": {"wisdom": 2, "depth": 1}}, {"text": "你想起那些没能来到这里的人，悄悄在篝火旁放了朵花", "scores": {"morals": 2, "depth": 1}}]}, {"id": 31, "text": "你的目光总是不自觉地追随战场上的某个人——", "options": [{"text": "那个驾驶自由高达的少年，每次出战都像不要命一样，但他看向和平时的眼神温柔得让人心疼", "scores": {"depth": 2, "morals": 1, "_sel": "m"}}, {"text": "那个在PLANT花店里笑着的少女，手上有伤痕却从不抱怨，她说花总是要开的时候眼睛在发光", "scores": {"wisdom": 1, "depth": 2, "_sel": "f"}}, {"text": "那个看似轻浮却总在关键时刻挡在你前面的男人，笑着说出最靠谱的建议", "scores": {"humor": 2, "bravery": 1, "_sel": "m"}}, {"text": "那个在奥布海岸线上握紧拳头的倔强女孩，宁死也不退缩，转身时却偷偷擦掉了眼泪", "scores": {"bravery": 2, "rebel": 1, "_sel": "f"}}]}, {"id": 32, "text": "一场重要战役的前夜，你收到了一个陌生号码发来的消息——", "options": [{"text": "他写得很简短：活下去。无论发生什么。然后附了一张他以前常去的那个花园的照片", "scores": {"loyalty": 2, "depth": 1, "_sel": "m"}}, {"text": "她说：花又开了，等你回来一起看。照片里是一束白色和粉色相间的花", "scores": {"depth": 2, "morals": 1, "_sel": "f"}}, {"text": "是他：别做蠢事。我还在等你。末尾加了个你熟悉的鬼脸符号", "scores": {"humor": 1, "loyalty": 2, "_sel": "m"}}, {"text": "是她：我做了你爱吃的，回来吧。附了一张有点歪的厨房照片，灶台上还冒着热气", "scores": {"loyalty": 2, "humor": 1, "_sel": "f"}}]}, {"id": 33, "text": "和平谈判的会场外，激进派正在策划暗杀。你偶然发现了他们的计划。如果揭发可能引发更大的战争，如果不揭发谈判一定会破裂。你？", "options": [{"text": "直接冲进会场通知所有人——哪怕被误会也要说", "scores": {"bravery": 2, "morals": 1}}, {"text": "暗中瓦解激进派的计划，不让任何人知道", "scores": {"wisdom": 2, "depth": 1}}, {"text": "找到激进派的领头人，尝试说服他放弃", "scores": {"rebel": 2, "depth": 1}}, {"text": "把消息匿名发给谈判各方——让他们自己判断", "scores": {"wisdom": 2, "adventure": 1}}]}, {"id": 34, "text": "调整者和自然人，到底有没有可能真正理解彼此？深夜的甲板上，战友突然问了这个问题。你看着星空——", "options": [{"text": "我不知道，但我会一直试下去", "scores": {"morals": 2, "bravery": 1}}, {"text": "问题不在于能不能理解，而在于愿不愿意试", "scores": {"wisdom": 2, "depth": 1}}, {"text": "我见过敌人流泪，也见过战友背叛——跟是谁没关系", "scores": {"depth": 2, "rebel": 1}}, {"text": "管他是调整者还是自然人，先活过今晚再说", "scores": {"humor": 1, "adventure": 1}}]}];

const DIMS=['loyalty','bravery','rebel','wisdom','depth','morals','adventure','humor'];
let qi=0,sc={},cqs=[],gender='';

function sh(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function start(){
  sw('intro','quiz');
  cqs=sh(QS).slice(0,10);
  sc={};DIMS.forEach(d=>sc[d]=0);qi=0;showQ();
}

function sw(from,to){
  document.getElementById(from).classList.remove('active');
  document.getElementById(to).classList.add('active');
}

function showQ(){
  let q=cqs[qi];
  document.getElementById('qt').textContent=q.text;
  document.getElementById('pb').style.width=(qi/10*100)+'%';
  document.getElementById('qn').textContent='第'+(qi+1)+'题';
  let od=document.getElementById('os');od.innerHTML='';
  sh(q.options).forEach(opt=>{
    let b=document.createElement('button');b.className='opt';b.textContent=opt.text;
    b.onclick=()=>pick(opt.scores,b);od.appendChild(b);
  });
  let c=document.getElementById('qc');c.classList.remove('fi');void c.offsetWidth;c.classList.add('fi');
}

function pick(s,btn){
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  for(let k in s)sc[k]=(sc[k]||0)+s[k];
  setTimeout(()=>{qi++;if(qi>=10)sw('quiz','gender');else showQ()},350);
}

function pickG(g,el){
  gender=g;
  document.querySelectorAll('.gcard').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(()=>{sw('gender','loading');setTimeout(calc,2200)},500);
}

function calc(){
  let tg=gender==='male'?'f':'m';
  let scores=[];
  for(let id in CHARS){
    let c=CHARS[id];
    if(c.g!==tg) continue;
    let dist=0;
    DIMS.forEach(d=>{
      let cv=c.s[d]||0, uv=(sc[d]||0)/2;
      dist+=(cv-uv)*(cv-uv);
    });
    scores.push({id,dist,c});
  }
  scores.sort((a,b)=>a.dist-b.dist);
  // 全量候选池（15人）加权随机，确保每个角色都有机会
  let top=scores; // 所有符合性别的角色都参与
  // 基础权重：距离反比（近的权重高）
  let ws=top.map(x=>1/(x.dist+1));
  // 保底权重：每个角色最低有均值的25%
  let avgW=ws.reduce((a,b)=>a+b,0)/ws.length;
  ws=ws.map(w=>Math.max(w, avgW*0.25));
  let tw=ws.reduce((a,b)=>a+b,0);
  let rnd=Math.random()*tw,cum=0,pick=top[0];
  for(let i=0;i<top.length;i++){cum+=ws[i];if(rnd<=cum){pick=top[i];break;}}
  let maxD=DIMS.length*10*10;
  let pct=Math.round((1-Math.sqrt(pick.dist)/Math.sqrt(maxD))*55+40);
  pct=Math.min(98,Math.max(52,pct));
  showR(pick.id,pick.c,pct);
}

function showR(id,c,pct){
  sw('loading','result');
  let story=c.tb||'';
  let paras=story.split('\n').filter(p=>p.trim());
  let h='';
  h+='<div class="mpct">'+pct+'<span style="font-size:.4em">%</span></div>';
  h+='<div class="mlbl">命 运 羁 绊 匹 配 度</div>';
  h+='<div class="divider" style="width:80px;margin:8px auto"></div>';
  h+='<div class="faction-tag">'+c.f+'</div>';
  h+='<div class="cname">'+c.n+'</div>';
  h+='<div class="ctitle">'+c.tt+'</div>';
  h+='<div class="reason">'+c.r+'</div>';
  if(paras.length){
    h+='<div class="story">';
    h+='<div class="stitle">— '+c.tt+' —</div>';
    paras.forEach(p=>h+='<p>'+p+'</p>');
    h+='</div>';
  }
  document.getElementById('rc').innerHTML=h;
}

function restart(){
  sw('result','intro');
  document.querySelectorAll('.gcard').forEach(c=>c.classList.remove('sel'));
}

// 粒子效果
(function(){
  let c=document.getElementById('pts');
  for(let i=0;i<40;i++){
    let p=document.createElement('div');p.className='particle';
    p.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()*3+1)+'px;height:'+(Math.random()*3+1)+'px;--d:'+(Math.random()*4+3)+'s;animation-delay:'+Math.random()*3+'s;opacity:'+(Math.random()*.5+.1);
    c.appendChild(p);
  }
})();
</script>
